<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDGETpro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-200">
  <div id="root"></div>

  <script type="text/babel">
    const SUPABASE_URL = 'https://wzhcyorshcxscgeajcgz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aGN5b3JzaGN4c2NnZWFqY2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDQxNTMsImV4cCI6MjA5MzEyMDE1M30.PJJJcqNpBlPW6DIQ3IyzxuIOF1ueSevqlohJ4FoTqz4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { useState, useEffect } = React;
    const formatRp = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);
    const displayDate = (s, e) => (!s ? '-' : (s === e ? s : `${s} s/d ${e}`));

    function App() {
      const [projects, setProjects] = useState([]);
      const [users, setUsers] = useState([]);
      const [currentUser, setCurrentUser] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [activeProject, setActiveProject] = useState(null);
      const [showNewProjectModal, setShowNewProjectModal] = useState(false);
      const [showItemModal, setShowItemModal] = useState(false);
      const [showActualModal, setShowActualModal] = useState(false);
      const [showDetailSidebar, setShowDetailSidebar] = useState(false);
      const [showFullReportSidebar, setShowFullReportSidebar] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [deleteConfig, setDeleteConfig] = useState({ isOpen: false });

      const fetchProjects = async () => {
        const { data } = await supabase.from('projects').select('*').order('id', { ascending: false });
        if (data) setProjects(data);
        setIsInitializing(false);
      };

      useEffect(() => {
        const sessionUser = localStorage.getItem('budget_current_user');
        if (sessionUser) setCurrentUser(JSON.parse(sessionUser));
        fetchProjects();

        const projectSub = supabase.channel('projects_realtime')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, fetchProjects)
          .subscribe();
        return () => supabase.removeChannel(projectSub);
      }, []);

      // FIX: Fungsi Simpan Manual
      const forceSaveToDB = async () => {
        if (!activeProject) return;
        const { error } = await supabase.from('projects').update({
          name: activeProject.name,
          startDate: activeProject.startDate,
          endDate: activeProject.endDate,
          target: activeProject.target,
          items: activeProject.items
        }).eq('id', activeProject.id);
        
        if (!error) alert("Data berhasil disinkronkan ke server!");
        else alert("Gagal sinkron: " + error.message);
      };

      const handleUpdateProjectInfo = async (field, value) => {
        const updated = { ...activeProject, [field]: value };
        setActiveProject(updated); 
        await supabase.from('projects').update({ [field]: value }).eq('id', updated.id);
      };

      // FIX: Menambah Item Biaya (Manual/Import) agar tersimpan permanen
      const handleSaveItem = async (itemData) => {
        let updatedItems = [];
        if (itemData.id && activeProject.items.find(i => i.id === itemData.id)) {
          updatedItems = activeProject.items.map(i => i.id === itemData.id ? itemData : i);
        } else {
          updatedItems = [...activeProject.items, { ...itemData, id: Date.now().toString(), actuals: [], status: 'pending' }];
        }
        
        const { error } = await supabase.from('projects').update({ items: updatedItems }).eq('id', activeProject.id);
        if (!error) {
          setActiveProject({ ...activeProject, items: updatedItems });
          setShowItemModal(false);
        } else {
          alert("Gagal simpan item: " + error.message);
        }
      };

      const saveActualsToDB = async (itemId, newActuals) => {
        const plannedItem = activeProject.items.find(i => i.id === itemId);
        const actualTotal = newActuals.reduce((sum, act) => sum + Number(act.amount), 0);
        const plannedTotal = plannedItem.qty * plannedItem.budget;
        
        let status = newActuals.length > 0 ? (actualTotal > plannedTotal ? 'over-budget' : (actualTotal < plannedTotal ? 'under-budget' : 'on-budget')) : 'pending';

        const updatedItems = activeProject.items.map(i => i.id === itemId ? { ...i, actuals: newActuals, status } : i);
        const { error } = await supabase.from('projects').update({ items: updatedItems }).eq('id', activeProject.id);
        if (!error) setActiveProject({ ...activeProject, items: updatedItems });
      };

      const executeDelete = async () => {
        if (deleteConfig.type === 'project') {
          await supabase.from('projects').delete().eq('id', deleteConfig.payload);
          setCurrentView('dashboard');
        } else if (deleteConfig.type === 'item') {
          const updatedItems = activeProject.items.filter(i => i.id !== deleteConfig.payload);
          await supabase.from('projects').update({ items: updatedItems }).eq('id', activeProject.id);
          setActiveProject({ ...activeProject, items: updatedItems });
        }
        setDeleteConfig({ isOpen: false });
      };

      if (isInitializing) return <div className="h-screen bg-blue-600 flex items-center justify-center text-white font-bold">Menghubungkan ke Server...</div>;
      if (!currentUser) return <AuthScreen onLogin={setCurrentUser} supabase={supabase} />;

      return (
        <div className="bg-gray-200 min-h-screen flex justify-center font-sans">
          <div className="w-full max-w-md bg-gray-50 min-h-screen relative shadow-2xl border-x border-gray-300 overflow-x-hidden">
            
            {currentView === 'dashboard' ? (
              <div className="pb-24 animate-fade-in">
                <header className="bg-blue-600 p-6 text-white rounded-b-3xl shadow-lg relative overflow-hidden">
                  <div className="relative z-10 flex justify-between items-center">
                    <h1 className="text-2xl font-black italic">BUDGETpro</h1>
                    <button onClick={() => {localStorage.removeItem('budget_current_user'); window.location.reload();}} className="bg-white/20 p-2 rounded-full"><i className="fa-solid fa-power-off"></i></button>
                  </div>
                  <p className="text-xs mt-2 opacity-80 font-bold uppercase tracking-widest">Halo, {currentUser.username}</p>
                </header>

                <div className="p-4 space-y-4 mt-2">
                  <h2 className="text-xs font-black uppercase text-gray-400 tracking-widest">Daftar Trip / Event</h2>
                  {projects.filter(p => currentUser.role === 'admin' || p.owner === currentUser.username).map(p => (
                    <div key={p.id} onClick={() => { setActiveProject(p); setCurrentView('project_detail'); }} className="bg-white p-5 rounded-2xl border-l-4 border-l-blue-500 shadow-sm active:scale-95 transition-all cursor-pointer">
                      <h3 className="font-bold text-gray-800 uppercase text-sm">{p.name}</h3>
                      <p className="text-[10px] text-gray-400 font-bold mt-1 uppercase">{displayDate(p.startDate, p.endDate)}</p>
                    </div>
                  ))}
                </div>

                <button onClick={() => setShowNewProjectModal(true)} className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-4 rounded-full font-black text-xs uppercase shadow-2xl z-30">+ Buat Trip Baru</button>
              </div>
            ) : (
              <div className="pb-28 animate-fade-in">
                <header className="sticky top-0 bg-white z-20 px-4 py-4 border-b flex items-center justify-between shadow-sm">
                  <div className="flex items-center gap-3">
                    <button onClick={() => setCurrentView('dashboard')} className="p-2 bg-gray-100 rounded-full"><i className="fa-solid fa-arrow-left"></i></button>
                    <h2 className="font-black text-gray-800 truncate text-sm uppercase">{activeProject.name}</h2>
                  </div>
                  <div className="flex gap-2">
                    {/* FITUR BARU: Tombol Simpan Manual */}
                    <button onClick={forceSaveToDB} className="w-9 h-9 bg-green-100 text-green-600 rounded-full flex items-center justify-center shadow-sm" title="Simpan Perubahan"><i className="fa-solid fa-floppy-disk"></i></button>
                    <button onClick={() => setDeleteConfig({ isOpen: true, type: 'project', payload: activeProject.id, title: 'Hapus Trip?', message: 'Data tidak bisa dikembalikan.' })} className="w-9 h-9 bg-red-100 text-red-500 rounded-full flex items-center justify-center"><i className="fa-solid fa-trash-can"></i></button>
                  </div>
                </header>

                <div className="p-4 space-y-4">
                  <div className="bg-white p-4 rounded-2xl shadow-sm space-y-3">
                    <input type="text" value={activeProject.name} onChange={(e) => handleUpdateProjectInfo('name', e.target.value)} className="w-full font-black uppercase text-sm border-b-2 outline-none focus:border-blue-500 pb-1" />
                    <div className="grid grid-cols-2 gap-2">
                      <input type="date" value={activeProject.startDate} onChange={(e) => handleUpdateProjectInfo('startDate', e.target.value)} className="text-xs font-bold p-2 bg-gray-50 rounded-lg outline-none" />
                      <input type="date" value={activeProject.endDate} onChange={(e) => handleUpdateProjectInfo('endDate', e.target.value)} className="text-xs font-bold p-2 bg-gray-50 rounded-lg outline-none" />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-blue-600 text-white p-4 rounded-2xl shadow-md">
                      <p className="text-[9px] font-black uppercase opacity-60">Rencana</p>
                      <p className="font-black text-sm">{formatRp(activeProject.items.reduce((s,i) => s + (i.qty * i.budget), 0))}</p>
                    </div>
                    <div className="bg-purple-600 text-white p-4 rounded-2xl shadow-md">
                      <p className="text-[9px] font-black uppercase opacity-60">Aktual</p>
                      <p className="font-black text-sm">{formatRp(activeProject.items.reduce((s,i) => s + i.actuals.reduce((sa, a) => sa + Number(a.amount), 0), 0))}</p>
                    </div>
                  </div>

                  <div className="space-y-3 mt-4">
                    <h3 className="text-[10px] font-black uppercase text-gray-400">Rincian Budget</h3>
                    {activeProject.items.map(item => (
                      <div key={item.id} onClick={() => { setSelectedItem(item); setShowDetailSidebar(true); }} className="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center relative overflow-hidden active:scale-95 transition-all">
                        <div className={`absolute left-0 top-0 bottom-0 w-1 ${item.status === 'over-budget' ? 'bg-red-500' : (item.status === 'pending' ? 'bg-gray-300' : 'bg-green-500')}`}></div>
                        <div>
                          <p className="font-black text-xs uppercase text-gray-800">{item.name}</p>
                          <p className="text-[10px] font-bold text-gray-400 mt-1">{item.qty} {item.unit} x {formatRp(item.budget)}</p>
                        </div>
                        <div className="text-right">
                          <p className="font-black text-xs text-blue-600">{formatRp(item.actuals.reduce((s,a) => s + Number(a.amount), 0))}</p>
                          <button onClick={(e) => { e.stopPropagation(); setSelectedItem(item); setShowActualModal(true); }} className="mt-1 text-[8px] bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-black uppercase">Input LPJ</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <button onClick={() => { setSelectedItem(null); setShowItemModal(true); }} className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full font-black text-xs uppercase shadow-2xl">+ Tambah Biaya</button>
              </div>
            )}

            {/* MODALS */}
            {showNewProjectModal && <NewProjectModal onClose={() => setShowNewProjectModal(false)} onSave={async (p) => {
              const { error } = await supabase.from('projects').insert([p]);
              if (!error) { setProjects([p, ...projects]); setActiveProject(p); setShowNewProjectModal(false); setCurrentView('project_detail'); }
            }} user={currentUser} />}

            {showItemModal && <ItemPlanModal item={selectedItem} onSave={handleSaveItem} onClose={() => setShowItemModal(false)} />}
            {showActualModal && <ActualModal item={selectedItem} onSave={saveActualsToDB} onClose={() => setShowActualModal(false)} projId={activeProject.id} />}
            {deleteConfig.isOpen && <ConfirmModal config={deleteConfig} onConfirm={executeDelete} onCancel={() => setDeleteConfig({ isOpen: false })} />}
          </div>
        </div>
      );
    }

    // FIX: Import Excel agar tersimpan permanen
    function NewProjectModal({ onClose, onSave, user }) {
      const [name, setName] = useState('');
      const [s, setS] = useState(new Date().toISOString().split('T')[0]);
      const [e, setE] = useState(new Date().toISOString().split('T')[0]);

      const handleImport = (event) => {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => {
          const wb = XLSX.read(evt.target.result, { type: 'binary' });
          const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          const items = data.map((r, i) => ({
            id: Date.now() + "_" + i,
            name: r.Item || 'Item ' + i,
            qty: Number(r.Qty || 1),
            unit: r.Unit || 'pcs',
            budget: Number(r['Budget Satuan'] || 0),
            actuals: [],
            status: 'pending'
          }));
          onSave({ id: Date.now().toString(), name: name || 'Trip Import', startDate: s, endDate: e, owner: user.username, items });
        };
        reader.readAsBinaryString(file);
      };

      return (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-end justify-center p-4 animate-fade-in">
          <div className="bg-white w-full max-w-sm rounded-t-[3rem] p-8 space-y-6 shadow-2xl animate-slide-up">
            <h3 className="font-black uppercase text-center text-gray-400 text-xs tracking-widest">Setup Trip Baru</h3>
            <input type="text" placeholder="NAMA EVENT" className="w-full border-2 p-4 rounded-2xl font-black uppercase text-sm outline-none focus:border-blue-500" onChange={x => setName(x.target.value)} />
            <div className="grid grid-cols-2 gap-2">
              <input type="date" value={s} onChange={x => setS(x.target.value)} className="w-full border p-3 rounded-xl text-xs font-bold" />
              <input type="date" value={e} onChange={x => setE(x.target.value)} className="w-full border p-3 rounded-xl text-xs font-bold" />
            </div>
            <div className="flex flex-col gap-2">
              <button onClick={() => onSave({ id: Date.now().toString(), name: name || 'Trip Manual', startDate: s, endDate: e, owner: user.username, items: [] })} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs">Simpan Manual</button>
              <label className="w-full py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs text-center cursor-pointer">
                Import Excel <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleImport} />
              </label>
            </div>
            <button onClick={onClose} className="w-full py-3 text-gray-400 font-bold uppercase text-[10px]">Batalkan</button>
          </div>
        </div>
      );
    }

    // FIX: Modal Penambahan Item (Tambah Rencana)
    function ItemPlanModal({ item, onSave, onClose }) {
      const [f, setF] = useState(item || { name: '', qty: 1, unit: 'orang', budget: 0 });
      return (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-end justify-center animate-fade-in">
          <div className="bg-white w-full max-w-sm rounded-t-[3rem] p-8 space-y-5 animate-slide-up shadow-2xl">
            <h3 className="font-black uppercase text-xs text-gray-400 tracking-widest">{item ? 'Edit Rencana' : 'Tambah Rencana'}</h3>
            <input type="text" placeholder="NAMA ITEM" value={f.name} onChange={e => setF({...f, name: e.target.value})} className="w-full border-2 p-4 rounded-2xl font-black uppercase text-sm outline-none focus:border-blue-500" />
            <div className="flex gap-2">
              <input type="number" placeholder="QTY" value={f.qty} onChange={e => setF({...f, qty: Number(e.target.value)})} className="w-1/3 border-2 p-4 rounded-2xl font-black text-sm" />
              <input type="text" placeholder="UNIT" value={f.unit} onChange={e => setF({...f, unit: e.target.value})} className="w-2/3 border-2 p-4 rounded-2xl font-black text-sm" />
            </div>
            <input type="number" placeholder="BUDGET SATUAN (RP)" value={f.budget} onChange={e => setF({...f, budget: Number(e.target.value)})} className="w-full border-2 p-4 rounded-2xl font-black text-sm" />
            <button onClick={() => onSave(f)} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl tracking-widest">Simpan Item</button>
            <button onClick={onClose} className="w-full py-2 text-gray-400 font-bold text-[10px] uppercase">Kembali</button>
          </div>
        </div>
      );
    }

    // FIX: Modal Input LPJ dengan Preview Gambar
    function ActualModal({ item, onSave, onClose, projId }) {
      const [actuals, setActuals] = useState(item.actuals || []);
      const [amt, setAmt] = useState('');
      const [dsc, setDsc] = useState('');
      const [receipt, setReceipt] = useState(null);
      const [loading, setLoading] = useState(false);

      const add = async () => {
        setLoading(true);
        let url = null;
        if (receipt) {
          const res = await fetch(receipt);
          const blob = await res.blob();
          const path = `${projId}/${Date.now()}.jpg`;
          await supabase.storage.from('receipts').upload(path, blob);
          const { data } = supabase.storage.from('receipts').getPublicUrl(path);
          url = data.publicUrl;
        }
        const newList = [...actuals, { id: Date.now(), amount: Number(amt.replace(/\./g, '')), description: dsc, receiptUrl: url }];
        setActuals(newList);
        setAmt(''); setDsc(''); setReceipt(null);
        setLoading(false);
      };

      return (
        <div className="fixed inset-0 bg-black/90 z-50 flex flex-col justify-end animate-fade-in">
          <div className="bg-white rounded-t-[3rem] p-8 max-h-[90vh] overflow-y-auto space-y-6 shadow-2xl animate-slide-up">
            <h3 className="font-black text-lg uppercase">Input LPJ: {item.name}</h3>
            <div className="space-y-3">
              {actuals.map(a => (
                <div key={a.id} className="bg-gray-50 p-3 rounded-xl border flex justify-between items-center">
                  <div className="flex gap-3 items-center">
                    {a.receiptUrl && <img src={a.receiptUrl} className="w-10 h-10 object-cover rounded-lg border shadow-sm" />}
                    <div><p className="font-black text-xs">{formatRp(a.amount)}</p><p className="text-[10px] font-bold text-gray-400">{a.description}</p></div>
                  </div>
                  <button onClick={() => setActuals(actuals.filter(x => x.id !== a.id))} className="text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                </div>
              ))}
            </div>
            <div className="bg-gray-100 p-6 rounded-[2.5rem] space-y-4">
              <input type="text" placeholder="NOMINAL RP" value={amt} onChange={e => setAmt(e.target.value.replace(/\D/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, "."))} className="w-full p-4 rounded-2xl font-black text-xl text-center text-purple-700 outline-none" />
              <input type="text" placeholder="KETERANGAN" value={dsc} onChange={e => setDsc(e.target.value)} className="w-full p-4 rounded-2xl font-bold text-sm outline-none" />
              {receipt && <img src={receipt} className="w-full h-32 object-cover rounded-2xl shadow-inner border-2 border-purple-200" />}
              <div className="grid grid-cols-2 gap-2">
                <label className="bg-white p-3 rounded-xl border-2 flex items-center justify-center gap-2 font-black text-[10px] cursor-pointer"><i className="fa-solid fa-camera text-purple-600"></i> Kamera <input type="file" accept="image/*" capture="environment" className="hidden" onChange={e => { const r = new FileReader(); r.onload = () => setReceipt(r.result); r.readAsDataURL(e.target.files[0]); }} /></label>
                <label className="bg-white p-3 rounded-xl border-2 flex items-center justify-center gap-2 font-black text-[10px] cursor-pointer"><i className="fa-solid fa-upload text-purple-600"></i> Galeri <input type="file" accept="image/*" className="hidden" onChange={e => { const r = new FileReader(); r.onload = () => setReceipt(r.result); r.readAsDataURL(e.target.files[0]); }} /></label>
              </div>
              <button onClick={add} disabled={loading} className="w-full py-4 bg-white border-2 border-purple-600 text-purple-600 rounded-2xl font-black uppercase text-xs">{loading ? 'Proses...' : '+ Tambah ke Daftar'}</button>
            </div>
            <button onClick={() => onSave(item.id, actuals)} className="w-full py-5 bg-purple-600 text-white rounded-2xl font-black uppercase shadow-xl">Update ke Server</button>
            <button onClick={onClose} className="w-full py-2 text-gray-400 font-bold text-[10px] uppercase">Tutup</button>
          </div>
        </div>
      );
    }

    function AuthScreen({ onLogin, supabase }) {
      const [u, setU] = useState(''); const [p, setP] = useState('');
      const submit = async () => {
        const { data } = await supabase.from('users').select('*').eq('username', u).eq('password', p);
        if (data && data.length > 0) { localStorage.setItem('budget_current_user', JSON.stringify(data[0])); onLogin(data[0]); }
        else alert("Akses Ditolak!");
      };
      return (
        <div className="h-screen bg-blue-600 flex items-center justify-center p-6">
          <div className="bg-white p-10 rounded-[3.5rem] w-full max-w-sm shadow-2xl text-center border-t-8 border-blue-400">
            <h1 className="text-3xl font-black text-blue-600 italic uppercase">BUDGETpro</h1>
            <p className="text-gray-400 text-[10px] font-bold mt-2 uppercase tracking-widest mb-10 leading-relaxed">semoga membantu kamu mempertanggungjawabkan budget</p>
            <input type="text" placeholder="Username" className="w-full border-2 p-4 rounded-2xl mb-4 font-bold text-center outline-none focus:border-blue-500" onChange={e=>setU(e.target.value)} />
            <input type="password" placeholder="Password" className="w-full border-2 p-4 rounded-2xl mb-8 font-bold text-center outline-none focus:border-blue-500" onChange={e=>setP(e.target.value)} />
            <button onClick={submit} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl tracking-widest active:scale-95 transition-all">Masuk</button>
          </div>
        </div>
      );
    }

    function ConfirmModal({ config, onConfirm, onCancel }) {
      return (
        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6 animate-fade-in">
          <div className="bg-white p-8 rounded-[2.5rem] w-full max-w-xs text-center shadow-2xl animate-slide-up">
            <i className="fa-solid fa-circle-exclamation text-red-500 text-5xl mb-4"></i>
            <h3 className="font-black uppercase text-sm mb-2">{config.title}</h3>
            <p className="text-[10px] font-bold text-gray-500 mb-6">{config.message}</p>
            <div className="flex gap-2">
              <button onClick={onCancel} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-black uppercase text-[10px]">Batal</button>
              <button onClick={onConfirm} className="flex-1 py-3 bg-red-600 text-white rounded-xl font-black uppercase text-[10px] shadow-lg">Hapus</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</body>
</html>
