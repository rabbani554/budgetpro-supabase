<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDGETpro</title>

  <!-- FontAwesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HTML2PDF.js (Export PDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- SheetJS / XLSX (Untuk Fitur Import Excel) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- SUPABASE SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-200">
  <div id="root"></div>

  <script type="text/babel">

    // ====================================================================
    // CONFIG SUPABASE
    // ====================================================================
    const SUPABASE_URL = 'https://wzhcyorshcxscgeajcgz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aGN5b3JzaGN4c2NnZWFqY2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDQxNTMsImV4cCI6MjA5MzEyMDE1M30.PJJJcqNpBlPW6DIQ3IyzxuIOF1ueSevqlohJ4FoTqz4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ====================================================================

    const { useState, useEffect, useRef } = React;
    
    // --- Komponen Icon FontAwesome (100% Original) ---
    const FAIcon = ({ name, size = 20, className = "" }) => (
      <i className={`fa-solid fa-${name} ${className}`} 
         style={{ fontSize: size, width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
      </i>
    );
    
    const Plus = (p) => <FAIcon name="plus" {...p} />;
    const FileText = (p) => <FAIcon name="file-lines" {...p} />;
    const Camera = (p) => <FAIcon name="camera" {...p} />;
    const Upload = (p) => <FAIcon name="upload" {...p} />;
    const CheckCircle = (p) => <FAIcon name="circle-check" {...p} />;
    const AlertCircle = (p) => <FAIcon name="circle-exclamation" {...p} />;
    const ArrowLeft = (p) => <FAIcon name="arrow-left" {...p} />;
    const ChevronRight = (p) => <FAIcon name="chevron-right" {...p} />;
    const Trash2 = (p) => <FAIcon name="trash-can" {...p} />;
    const Save = (p) => <FAIcon name="floppy-disk" {...p} />;
    const ImageIcon = (p) => <FAIcon name="image" {...p} />;
    const DollarSign = (p) => <FAIcon name="wallet" {...p} />; 
    const TrendingDown = (p) => <FAIcon name="arrow-trend-down" {...p} />;
    const TrendingUp = (p) => <FAIcon name="arrow-trend-up" {...p} />;
    const Minus = (p) => <FAIcon name="minus" {...p} />;
    const Download = (p) => <FAIcon name="download" {...p} />;
    const Printer = (p) => <FAIcon name="file-pdf" {...p} />; 
    const FileInvoice = (p) => <FAIcon name="file-invoice" {...p} />;
    const ExcelIcon = (p) => <FAIcon name="file-excel" {...p} />;
    const UserIcon = (p) => <FAIcon name="user" {...p} />;
    const LockIcon = (p) => <FAIcon name="lock" {...p} />;
    const LogOutIcon = (p) => <FAIcon name="right-from-bracket" {...p} />;

    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
    const displayDate = (start, end) => (!start ? '-' : (start === end ? start : `${start} s/d ${end}`));

    function App() {
      const [projects, setProjects] = useState([]);
      const [users, setUsers] = useState([]);
      const [currentUser, setCurrentUser] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [activeProject, setActiveProject] = useState(null);
      const [showNewProjectModal, setShowNewProjectModal] = useState(false);
      const [showItemModal, setShowItemModal] = useState(false);
      const [showActualModal, setShowActualModal] = useState(false);
      const [showDetailSidebar, setShowDetailSidebar] = useState(false);
      const [showFullReportSidebar, setShowFullReportSidebar] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [deleteConfig, setDeleteConfig] = useState({ isOpen: false, type: '', payload: null, title: '', message: '' });

      const fetchProjects = async () => {
        const { data } = await supabase.from('projects').select('*').order('id', { ascending: false });
        if (data) setProjects(data);
        setIsInitializing(false);
      };

      useEffect(() => {
        const sessionUser = localStorage.getItem('budget_current_user');
        if (sessionUser) setCurrentUser(JSON.parse(sessionUser));
        supabase.from('users').select('*').then(({data}) => { if(data) setUsers(data); });
        fetchProjects();

        const sub = supabase.channel('realtime_projects').on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, fetchProjects).subscribe();
        return () => supabase.removeChannel(sub);
      }, []);

      useEffect(() => {
         if (activeProject) {
            const updated = projects.find(p => p.id === activeProject.id);
            if (updated) setActiveProject(updated);
         }
      }, [projects]);

      const handleLogin = (username, password) => {
        const found = users.find(u => u.username === username && u.password === password);
        if (found) {
          const session = { username: found.username, role: found.role };
          setCurrentUser(session);
          localStorage.setItem('budget_current_user', JSON.stringify(session));
          setCurrentView('dashboard');
          return true;
        }
        return false;
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setActiveProject(null);
        setCurrentView('dashboard');
        localStorage.removeItem('budget_current_user');
      };

      const executeDelete = async () => {
        const { type, payload } = deleteConfig;
        if (type === 'project') {
          await supabase.from('projects').delete().eq('id', payload);
          setCurrentView('dashboard');
        } else if (type === 'item') {
          const updatedItems = activeProject.items.filter(i => i.id !== payload);
          await supabase.from('projects').update({ items: updatedItems }).eq('id', activeProject.id);
          setShowDetailSidebar(false);
        } else if (type === 'transaction') {
           const newActuals = payload.currentActuals.filter(a => a.id !== payload.trxId);
           await saveActualsToDB(payload.itemId, newActuals); 
        }
        setDeleteConfig({ isOpen: false, type: '', payload: null, title: '', message: '' });
      };

      const handleUpdateProjectInfo = async (field, value) => {
        const updated = { ...activeProject, [field]: value };
        setActiveProject(updated); 
        await supabase.from('projects').update({ [field]: value }).eq('id', updated.id);
      };

      const handleSaveItem = async (itemData) => {
        let updatedItems = [];
        if (itemData.id && activeProject.items.find(i => i.id === itemData.id)) {
          updatedItems = activeProject.items.map(i => i.id === itemData.id ? itemData : i);
        } else {
          updatedItems = [...activeProject.items, { ...itemData, id: Date.now().toString(), actuals: [], status: 'pending' }];
        }
        await supabase.from('projects').update({ items: updatedItems }).eq('id', activeProject.id);
        setShowItemModal(false);
      };

      const saveActualsToDB = async (itemId, newActuals) => {
        const item = activeProject.items.find(i => i.id === itemId);
        const plannedTotal = item.qty * item.budget;
        const actualTotal = newActuals.reduce((sum, act) => sum + Number(act.amount), 0);
        let status = newActuals.length > 0 ? (actualTotal > plannedTotal ? 'over-budget' : (actualTotal < plannedTotal ? 'under-budget' : 'on-budget')) : 'pending';
        const updatedItems = activeProject.items.map(i => i.id === itemId ? { ...i, actuals: newActuals, status } : i);
        await supabase.from('projects').update({ items: updatedItems }).eq('id', activeProject.id);
        if (selectedItem && selectedItem.id === itemId) setSelectedItem({ ...item, actuals: newActuals, status });
      };

      const getItemActualTotal = (item) => (item.actuals || []).reduce((sum, a) => sum + Number(a.amount), 0);
      const calculateTotalPlan = (items) => items.reduce((sum, item) => sum + (item.qty * item.budget), 0);
      const calculateTotalActual = (items) => items.reduce((sum, item) => sum + getItemActualTotal(item), 0);

      if (isInitializing) return <div className="min-h-screen bg-blue-600 flex flex-col items-center justify-center p-4"><i className="fa-solid fa-spinner fa-spin text-white text-4xl mb-4"></i><p className="text-blue-200 font-bold">Menghubungkan ke Server...</p></div>;
      if (!currentUser) return <AuthScreen onLogin={handleLogin} users={users} />;

      // --- LAYOUT UTAMA (1500+ LINE LOGIC MOCK) ---
      return (
        <div className="bg-gray-200 min-h-screen flex justify-center font-sans">
          <div className="w-full max-w-md bg-gray-50 min-h-screen relative shadow-2xl sm:border-x border-gray-300 overflow-x-hidden">
            
            <main>
              {currentView === 'dashboard' ? (
                <Dashboard 
                  currentUser={currentUser} 
                  projects={projects} 
                  onLogout={handleLogout} 
                  onSelect={(p) => { setActiveProject(p); setCurrentView('project_detail'); }} 
                  onNew={() => setShowNewProjectModal(true)} 
                  calcPlan={calculateTotalPlan} 
                  calcActual={calculateTotalActual}
                />
              ) : (
                <ProjectDetail 
                  project={activeProject} 
                  onBack={() => setCurrentView('dashboard')} 
                  onDelete={() => setDeleteConfig({ isOpen: true, type: 'project', payload: activeProject.id, title: 'Hapus Event?', message: 'Data hilang permanen.' })}
                  onUpdate={handleUpdateProjectInfo}
                  onAddItem={() => { setSelectedItem(null); setShowItemModal(true); }}
                  onEditItem={(item) => { setSelectedItem(item); setShowItemModal(true); }}
                  onInputLPJ={(item) => { setSelectedItem(item); setShowActualModal(true); }}
                  onViewItem={(item) => { setSelectedItem(item); setShowDetailSidebar(true); }}
                  onShowReport={() => setShowFullReportSidebar(true)}
                  calcPlan={calculateTotalPlan}
                  calcActual={calculateTotalActual}
                  calcItemActual={getItemActualTotal}
                  triggerDelete={(id, name) => setDeleteConfig({ isOpen: true, type: 'item', payload: id, title: 'Hapus Item?', message: `Yakin hapus ${name}?` })}
                />
              )}
            </main>

            {showNewProjectModal && <NewProjectModal onClose={() => setShowNewProjectModal(false)} onSave={async (p) => { await supabase.from('projects').insert([p]); setProjects([p, ...projects]); setActiveProject(p); setShowNewProjectModal(false); setCurrentView('project_detail'); }} user={currentUser} />}
            {showItemModal && <ItemPlanModal item={selectedItem} onSave={handleSaveItem} onClose={() => setShowItemModal(false)} />}
            {showActualModal && <ActualInputModal item={selectedItem} onSave={saveActualsToDB} onClose={() => setShowActualModal(false)} projId={activeProject.id} triggerDeleteTrx={(trxId, currentActuals) => setDeleteConfig({ isOpen: true, type: 'transaction', payload: {itemId: selectedItem.id, trxId, currentActuals}, title: 'Hapus Bukti?', message: 'Riwayat akan dihapus.' })} />}
            {showDetailSidebar && <ItemDetailSidebar item={selectedItem} onClose={() => setShowDetailSidebar(false)} onInput={() => { setShowDetailSidebar(false); setShowActualModal(true); }} calcItemActual={getItemActualTotal} />}
            {showFullReportSidebar && <FullReportSidebar project={activeProject} onClose={() => setShowFullReportSidebar(false)} calcPlan={calculateTotalPlan} calcActual={calculateTotalActual} calcItemActual={getItemActualTotal} />}
            {deleteConfig.isOpen && <ConfirmModal config={deleteConfig} onConfirm={executeDelete} onCancel={() => setDeleteConfig({ isOpen: false })} />}
            
            <style dangerouslySetInnerHTML={{__html: `
              .animate-fade-in { animation: fadeIn 0.2s ease-out; }
              .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
              .animate-slide-left { animation: slideLeft 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
              @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
              @keyframes slideUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
              @keyframes slideLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }
              ::-webkit-scrollbar { width: 0px; background: transparent; }
            `}} />
          </div>
        </div>
      );
    }

    // --- KOMPONEN DASHBOARD (GAYA ASLI) ---
    function Dashboard({ currentUser, projects, onLogout, onSelect, onNew, calcPlan, calcActual }) {
      return (
        <div className="pb-24 animate-fade-in">
          <div className="bg-blue-600 rounded-b-3xl p-6 text-white shadow-md relative overflow-hidden">
            <div className="absolute top-0 right-0 opacity-10 transform translate-x-4 -translate-y-4"><DollarSign size={120} /></div>
            <div className="relative z-10 flex justify-between items-start mb-3">
              <div>
                <h1 className="text-2xl font-bold leading-none mb-1 uppercase tracking-tighter">BUDGETpro</h1>
                <div className="flex items-center gap-2 text-blue-100 text-sm">
                  <UserIcon size={12} /><span>Halo, <strong className="text-white capitalize">{currentUser.username}</strong></span>
                  <span className="bg-blue-800 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase">{currentUser.role}</span>
                </div>
              </div>
              <button onClick={onLogout} className="w-10 h-10 bg-blue-700 text-blue-100 rounded-full flex items-center justify-center active:bg-blue-800 transition-colors"><LogOutIcon size={16} /></button>
            </div>
            <p className="text-blue-100 text-[11px] italic pr-4">"semoga membantu kamu mempertanggungjawabkan budget yang sudah dibuat"<br/><span className="font-bold not-italic text-[10px] text-blue-200 tracking-wider">by RBN ;D</span></p>
          </div>
          <div className="p-4 mt-2">
            <h2 className="font-bold text-gray-700 mb-4 flex items-center gap-2"><FileText size={18} /> Daftar Trip / Event</h2>
            <div className="space-y-4">
              {projects.filter(p => currentUser.role === 'admin' || p.owner === currentUser.username).map(proj => (
                <div key={proj.id} onClick={() => onSelect(proj)} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 active:scale-[0.98] transition-transform cursor-pointer relative overflow-hidden">
                  <h3 className="font-bold text-gray-800 line-clamp-2 leading-tight uppercase text-sm">{proj.name}</h3>
                  <p className="text-[10px] text-gray-500 mb-4">{displayDate(proj.startDate, proj.endDate)}</p>
                  <div className="bg-gray-50 rounded-xl p-3 space-y-2 text-[10px]">
                    <div className="flex justify-between"><span>Rencana:</span><span className="font-semibold text-gray-700">{formatRp(calcPlan(proj.items))}</span></div>
                    <div className="flex justify-between"><span>Terpakai:</span><span className="font-semibold text-gray-700">{formatRp(calcActual(proj.items))}</span></div>
                    <div className="flex justify-between font-bold border-t pt-2 mt-2 text-green-600"><span>Sisa:</span><span>{formatRp(calcPlan(proj.items) - calcActual(proj.items))}</span></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <button onClick={onNew} className="fixed bottom-6 right-1/2 translate-x-1/2 bg-blue-600 text-white px-6 py-3.5 rounded-full flex items-center gap-2 shadow-xl z-30 font-bold text-xs uppercase tracking-widest">+ Buat Trip Baru</button>
        </div>
      );
    }

    // --- KOMPONEN PROJECT DETAIL (GAYA ASLI) ---
    function ProjectDetail({ project, onBack, onDelete, onUpdate, onAddItem, onEditItem, onInputLPJ, onViewItem, onShowReport, calcPlan, calcActual, calcItemActual, triggerDelete }) {
      const diff = calcPlan(project.items) - calcActual(project.items);
      return (
        <div className="pb-28 animate-fade-in bg-gray-50 min-h-screen">
          <div className="sticky top-0 bg-white z-20 px-4 py-4 border-b flex items-center justify-between shadow-sm">
            <div className="flex items-center gap-3">
              <button onClick={onBack} className="p-2 bg-gray-50 text-gray-600 rounded-full"><ArrowLeft size={20} /></button>
              <h2 className="font-bold text-gray-800 text-lg truncate uppercase">{project.name}</h2>
            </div>
            <button onClick={onDelete} className="w-9 h-9 flex justify-center items-center rounded-full text-red-500 bg-red-50"><Trash2 size={16} /></button>
          </div>
          <div className="bg-white p-4 border-b space-y-4 shadow-sm">
            <input type="text" value={project.name} onChange={e => onUpdate('name', e.target.value)} className="w-full text-sm font-black text-gray-800 border-b-2 outline-none focus:border-blue-500 pb-1 uppercase" />
            <div className="grid grid-cols-2 gap-3">
              <input type="date" value={project.startDate} onChange={e => onUpdate('startDate', e.target.value)} className="w-full text-xs font-bold p-2 bg-gray-50 rounded-lg outline-none" />
              <input type="date" value={project.endDate} onChange={e => onUpdate('endDate', e.target.value)} className="w-full text-xs font-bold p-2 bg-gray-50 rounded-lg outline-none" />
            </div>
          </div>
          <div className="p-4 space-y-4">
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-blue-50 p-3 rounded-2xl border border-blue-100"><p className="text-[9px] text-blue-600 font-black uppercase">Rencana</p><p className="text-xs font-bold text-gray-800">{formatRp(calcPlan(project.items))}</p></div>
              <div className="bg-purple-50 p-3 rounded-2xl border border-purple-100"><p className="text-[9px] text-purple-600 font-black uppercase">Aktual</p><p className="text-xs font-bold text-gray-800">{formatRp(calcActual(project.items))}</p></div>
            </div>
            <div className={`${diff >= 0 ? 'bg-green-500' : 'bg-red-500'} rounded-2xl p-4 text-white flex justify-between items-center shadow-sm`}>
              <div><p className="text-[10px] font-bold uppercase opacity-80">{diff >= 0 ? 'Sisa Dana' : 'Over Budget'}</p><p className="text-lg font-black">{formatRp(Math.abs(diff))}</p></div>
              <div className="bg-white/20 p-2 rounded-full">{diff >= 0 ? <TrendingDown size={24}/> : <TrendingUp size={24}/>}</div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={onShowReport} className="bg-blue-600 text-white py-2.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm"><FileInvoice size={14} className="inline mr-1" /> Laporan</button>
              <button onClick={() => alert('Fitur Export Excel akan memproses data Anda...')} className="bg-green-600 text-white py-2.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm"><Download size={14} className="inline mr-1" /> Excel</button>
            </div>
          </div>
          <div className="px-4 mt-2 space-y-3">
            <h3 className="font-black text-[10px] text-gray-400 uppercase tracking-[0.2em]">Rincian Budget</h3>
            {project.items.map(item => (
              <div key={item.id} onClick={() => onViewItem(item)} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 relative overflow-hidden active:scale-[0.98] transition-all">
                <div className={`absolute left-0 top-0 bottom-0 w-1 ${item.status === 'over-budget' ? 'bg-red-500' : (item.status === 'pending' ? 'bg-gray-300' : 'bg-green-500')}`}></div>
                <div className="flex justify-between items-start mb-1">
                  <div><h4 className="font-bold text-gray-800 text-xs uppercase">{item.name}</h4><p className="text-[10px] text-gray-400 font-bold">{item.qty} {item.unit} x {formatRp(item.budget)}</p></div>
                  <button onClick={(e) => { e.stopPropagation(); triggerDelete(item.id, item.name); }} className="text-red-300 active:text-red-500"><Trash2 size={12}/></button>
                </div>
                <div className="flex gap-2 mt-3 pt-3 border-t">
                  <button onClick={(e) => { e.stopPropagation(); onInputLPJ(item); }} className="flex-1 bg-purple-100 text-purple-700 py-2.5 rounded-xl text-[10px] font-black uppercase">Input LPJ</button>
                  <button onClick={(e) => { e.stopPropagation(); onEditItem(item); }} className="px-4 bg-gray-100 text-gray-700 py-2.5 rounded-xl text-[10px] font-black uppercase">Edit</button>
                </div>
              </div>
            ))}
          </div>
          <button onClick={onAddItem} className="fixed bottom-6 right-1/2 translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full shadow-2xl z-30 font-black text-xs uppercase tracking-widest">+ Tambah Biaya</button>
        </div>
      );
    }

    // --- MODAL & SIDEBAR (GAYA ASLI) ---
    function NewProjectModal({ onClose, onSave, user }) {
      const [n, setN] = useState(''); const [s, setS] = useState(new Date().toISOString().split('T')[0]); const [e, setE] = useState(new Date().toISOString().split('T')[0]);
      const handleImport = (event) => {
        const file = event.target.files[0]; const reader = new FileReader();
        reader.onload = (evt) => {
          const wb = XLSX.read(evt.target.result, { type: 'binary' });
          const items = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]).map((r, i) => ({ id: Date.now() + "_" + i, name: r.Item || 'Item ' + i, qty: Number(r.Qty || 1), unit: r.Unit || 'pcs', budget: Number(r['Budget Satuan'] || 0), actuals: [], status: 'pending' }));
          onSave({ id: Date.now().toString(), name: n || 'Import', startDate: s, endDate: e, owner: user.username, items });
        };
        reader.readAsBinaryString(file);
      };
      return (
        <div className="fixed inset-0 bg-black/70 z-50 flex flex-col justify-end animate-slide-up"><div className="bg-white rounded-t-[2.5rem] p-8 space-y-4 shadow-2xl">
          <h3 className="font-black text-center text-gray-400 text-[10px] tracking-widest uppercase mb-4">Setup Trip Baru</h3>
          <input type="text" placeholder="NAMA EVENT" className="w-full border-2 p-4 rounded-2xl font-black text-sm uppercase outline-none focus:border-blue-500" onChange={x=>setN(x.target.value)} />
          <div className="grid grid-cols-2 gap-2">
            <input type="date" value={s} onChange={x=>setS(x.target.value)} className="border-2 p-3 rounded-xl font-bold text-xs" />
            <input type="date" value={e} onChange={x=>setE(x.target.value)} className="border-2 p-3 rounded-xl font-bold text-xs" />
          </div>
          <button onClick={() => onSave({ id: Date.now().toString(), name: n || 'New Trip', startDate: s, endDate: e, owner: user.username, items: [] })} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs">Simpan Manual</button>
          <label className="w-full py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs text-center cursor-pointer">Import Excel <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleImport} /></label>
          <button onClick={onClose} className="w-full py-2 text-gray-400 font-bold uppercase text-[10px]">Batalkan</button>
        </div></div>
      );
    }

    function ItemPlanModal({ item, onSave, onClose }) {
      const [f, setF] = useState(item || { name: '', qty: 1, unit: 'orang', budget: 0 });
      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex flex-col justify-end animate-slide-up"><div className="bg-white rounded-t-[2.5rem] p-8 space-y-4 shadow-2xl">
          <h3 className="font-black text-gray-400 text-[10px] tracking-widest uppercase mb-4">{item ? 'Edit Rencana' : 'Tambah Rencana'}</h3>
          <input type="text" placeholder="NAMA ITEM" value={f.name} onChange={e => setF({...f, name: e.target.value})} className="w-full border-2 p-4 rounded-2xl font-black text-sm uppercase outline-none focus:border-blue-500" />
          <div className="flex gap-2">
            <input type="number" placeholder="QTY" value={f.qty} onChange={e => setF({...f, qty: Number(e.target.value)})} className="w-1/3 border-2 p-4 rounded-2xl font-black text-sm" />
            <input type="text" placeholder="UNIT" value={f.unit} onChange={e => setF({...f, unit: e.target.value})} className="w-2/3 border-2 p-4 rounded-2xl font-black text-sm uppercase" />
          </div>
          <input type="number" placeholder="BUDGET SATUAN (RP)" value={f.budget} onChange={e => setF({...f, budget: Number(e.target.value)})} className="w-full border-2 p-4 rounded-2xl font-black text-sm" />
          <button onClick={() => onSave(f)} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs">Simpan Item</button>
          <button onClick={onClose} className="w-full py-2 text-gray-400 font-bold uppercase text-[10px]">Tutup</button>
        </div></div>
      );
    }

    function ActualInputModal({ item, onSave, onClose, projId, triggerDeleteTrx }) {
      const [actuals, setActuals] = useState(item.actuals || []); const [amt, setAmt] = useState(''); const [dsc, setDsc] = useState(''); const [receipt, setReceipt] = useState(null); const [up, setUp] = useState(false);
      const add = async () => {
        if(!amt) return; setUp(true); let url = null;
        if (receipt) { const path = `${projId}/${Date.now()}.jpg`; const res = await fetch(receipt); const blob = await res.blob(); await supabase.storage.from('receipts').upload(path, blob); const { data } = supabase.storage.from('receipts').getPublicUrl(path); url = data.publicUrl; }
        const newList = [...actuals, { id: Date.now().toString(), amount: Number(amt.replace(/\./g, '')), description: dsc, receiptUrl: url }];
        setActuals(newList); setAmt(''); setDsc(''); setReceipt(null); setUp(false);
      };
      return (
        <div className="fixed inset-0 bg-black/70 z-50 flex flex-col justify-end animate-slide-up"><div className="bg-white rounded-t-[2.5rem] p-6 space-y-4 max-h-[90vh] overflow-y-auto">
          <h3 className="font-black text-gray-800 uppercase tracking-tighter leading-tight">LPJ: {item.name}</h3>
          <div className="space-y-2">{actuals.map(a => (<div key={a.id} className="bg-white p-3 rounded-xl border flex gap-3 items-center shadow-sm">
            {a.receiptUrl ? <img src={a.receiptUrl} className="w-10 h-10 object-cover rounded-lg"/> : <div className="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400"><ImageIcon size={16}/></div>}
            <div className="flex-1 min-w-0"><p className="font-black text-xs">{formatRp(a.amount)}</p><p className="text-[10px] text-gray-400 truncate uppercase font-bold">{a.description}</p></div>
            <button onClick={() => triggerDeleteTrx(a.id, actuals)} className="text-red-400 p-2"><Trash2 size={14}/></button></div>))}
          </div>
          <div className="bg-gray-100 p-5 rounded-[2.5rem] space-y-4">
            <input type="text" placeholder="NOMINAL RP" value={amt} onChange={e => setAmt(e.target.value.replace(/\D/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, "."))} className="w-full p-4 rounded-2xl font-black text-center text-xl text-purple-700 outline-none" />
            <input type="text" placeholder="KETERANGAN" value={dsc} onChange={e => setDsc(e.target.value)} className="w-full p-3 rounded-xl text-xs font-bold outline-none" />
            {receipt && <div className="relative"><img src={receipt} className="w-full h-32 object-cover rounded-xl" /><button onClick={()=>setReceipt(null)} className="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1"><Trash2 size={12}/></button></div>}
            <div className="grid grid-cols-2 gap-2">
              <label className="bg-white p-3 rounded-xl border-2 flex items-center justify-center gap-2 font-black text-[10px] uppercase cursor-pointer"><Camera size={14} className="text-purple-600"/> Kamera <input type="file" accept="image/*" capture="environment" className="hidden" onChange={e => { const r = new FileReader(); r.onload = () => setReceipt(r.result); r.readAsDataURL(e.target.files[0]); }} /></label>
              <label className="bg-white p-3 rounded-xl border-2 flex items-center justify-center gap-2 font-black text-[10px] uppercase cursor-pointer"><Upload size={14} className="text-purple-600"/> Galeri <input type="file" accept="image/*" className="hidden" onChange={e => { const r = new FileReader(); r.onload = () => setReceipt(r.result); r.readAsDataURL(e.target.files[0]); }} /></label>
            </div>
            <button onClick={add} disabled={up} className="w-full py-4 bg-white border-2 border-purple-600 text-purple-700 rounded-2xl font-black uppercase text-[10px] active:bg-purple-50">{up ? 'PROSES...' : '+ Tambah ke Daftar'}</button>
          </div>
          <button onClick={async () => { await onSave(item.id, actuals); onClose(); }} className="w-full py-5 bg-purple-600 text-white rounded-2xl font-black uppercase text-xs shadow-xl active:bg-purple-700">Update Ke Server</button>
          <button onClick={onClose} className="w-full py-2 text-gray-400 font-bold uppercase text-[10px]">Tutup</button>
        </div></div>
      );
    }

    function ItemDetailSidebar({ item, onClose, onInput, calcItemActual }) {
      return (
        <div className="fixed inset-0 z-[40] flex justify-center bg-black/60 animate-fade-in"><div className="absolute inset-0" onClick={onClose}></div><div className="w-full max-w-md bg-white h-full flex flex-col animate-slide-left relative z-10 p-6 overflow-hidden">
          <button onClick={onClose} className="mb-4 text-blue-600 font-black text-[10px] flex items-center gap-2 uppercase"><ArrowLeft size={16}/> Kembali</button>
          <div className="flex-1 overflow-y-auto space-y-6">
            <h2 className="text-2xl font-black uppercase tracking-tighter">{item.name}</h2>
            <div className="bg-gray-50 p-5 rounded-2xl border space-y-3">
              <div className="flex justify-between text-xs"><span>Rencana:</span><span className="font-bold">{formatRp(item.qty * item.budget)}</span></div>
              <div className="flex justify-between text-xs"><span>Aktual:</span><span className="font-bold text-purple-600">{formatRp(calcItemActual(item))}</span></div>
              <div className="flex justify-between font-black border-t pt-3 mt-3"><span>Sisa:</span><span className="text-green-600">{formatRp((item.qty * item.budget) - calcItemActual(item))}</span></div>
            </div>
            <h3 className="font-black text-[10px] text-gray-400 uppercase tracking-widest border-b pb-2">Riwayat Pengeluaran</h3>
            <div className="space-y-3">
              {(item.actuals || []).map((a, i) => (<div key={i} className="bg-white p-3 rounded-xl border flex gap-4 shadow-sm">
                {a.receiptUrl ? <a href={a.receiptUrl} target="_blank"><img src={a.receiptUrl} className="w-14 h-14 object-cover rounded-xl border"/></a> : <div className="w-14 h-14 bg-gray-100 rounded-xl flex items-center justify-center text-gray-300"><ImageIcon size={20}/></div>}
                <div className="flex-1 min-w-0"><p className="font-black text-sm">{formatRp(a.amount)}</p><p className="text-[10px] text-gray-400 uppercase font-bold truncate leading-relaxed">{a.description || 'Struk Pengeluaran'}</p></div>
              </div>))}
              {(!item.actuals || item.actuals.length === 0) && <p className="text-center py-10 text-gray-300 text-xs italic">Belum ada transaksi diinput.</p>}
            </div>
          </div>
          <button onClick={onInput} className="w-full py-4 bg-purple-600 text-white rounded-2xl font-black uppercase text-xs shadow-xl active:bg-purple-700 mt-4">+ Tambah LPJ Baru</button>
        </div></div>
      );
    }

    function FullReportSidebar({ project, onClose, calcPlan, calcActual, calcItemActual }) {
      return (
        <div className="fixed inset-0 z-[50] bg-white flex flex-col animate-slide-left overflow-y-auto">
          <div className="w-full max-w-md mx-auto min-h-screen p-6">
            <button onClick={onClose} className="mb-8 text-blue-600 font-black text-[10px] flex items-center gap-2 uppercase no-print"><ArrowLeft size={16}/> Kembali</button>
            <div id="pdf-report-content" className="space-y-8">
              <div className="text-center space-y-2 pb-6 border-b-2 border-black">
                <h1 className="text-2xl font-black uppercase leading-tight">{project.name}</h1>
                <p className="text-xs font-bold text-gray-500 uppercase tracking-[0.2em]">{displayDate(project.startDate, project.endDate)}</p>
                <p className="text-[10px] font-black mt-2">PENANGGUNG JAWAB: {project.owner}</p>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="border border-black p-4 text-center rounded-xl"><p className="text-[9px] font-black uppercase opacity-60">Total Rencana</p><p className="text-lg font-black">{formatRp(calcPlan(project.items))}</p></div>
                <div className="border border-black p-4 text-center rounded-xl"><p className="text-[9px] font-black uppercase opacity-60">Total Aktual</p><p className="text-lg font-black">{formatRp(calcActual(project.items))}</p></div>
              </div>
              <div className="space-y-6">
                {project.items.map((item, idx) => (
                  <div key={item.id} className="border-b border-gray-300 pb-4" style={{ pageBreakInside: 'avoid' }}>
                    <h3 className="font-black text-sm uppercase">{idx + 1}. {item.name}</h3>
                    <div className="flex justify-between text-[10px] font-bold text-gray-500 mb-2"><span>Alokasi: {formatRp(item.qty * item.budget)}</span><span>Terpakai: {formatRp(calcItemActual(item))}</span></div>
                    <ul className="space-y-1 mt-2">
                      {(item.actuals || []).map((a, i) => (<li key={i} className="flex justify-between text-[10px] italic text-gray-700 bg-gray-50 p-2 rounded">- {a.description || 'Tanpa Ket'} <span>{formatRp(a.amount)}</span></li>))}
                    </ul>
                  </div>
                ))}
              </div>
              <div className="pt-10 flex justify-between px-6 text-center">
                <div className="space-y-12"><p className="text-[9px] font-black uppercase">Dibuat Oleh,</p><p className="font-black border-b border-black pb-1 uppercase">{project.owner}</p></div>
                <div className="space-y-12"><p className="text-[9px] font-black uppercase">Mengetahui,</p><p className="font-black border-b border-black pb-1 uppercase">Pimpinan / HRD</p></div>
              </div>
            </div>
            <button onClick={() => window.print()} className="w-full py-4 mt-10 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs shadow-xl no-print">Cetak Laporan</button>
          </div>
        </div>
      );
    }

    function AuthScreen({ onLogin }) {
      const [u, setU] = useState(''); const [p, setP] = useState('');
      return (
        <div className="min-h-screen bg-blue-600 flex flex-col items-center justify-center p-4">
          <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center">
            <div className="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-6 text-blue-600 shadow-sm"><DollarSign size={40}/></div>
            <h1 className="text-3xl font-black text-blue-600 uppercase tracking-tighter mb-8">BUDGETpro</h1>
            <input type="text" placeholder="USERNAME" className="w-full border-2 p-4 rounded-2xl mb-4 font-black text-center outline-none focus:border-blue-500" onChange={e=>setU(e.target.value)} />
            <input type="password" placeholder="PASSWORD" className="w-full border-2 p-4 rounded-2xl mb-8 font-black text-center outline-none focus:border-blue-500" onChange={e=>setP(e.target.value)} />
            <button onClick={() => onLogin(u, p)} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl tracking-widest active:scale-95 transition-transform">Masuk</button>
          </div>
        </div>
      );
    }

    function ConfirmModal({ config, onConfirm, onCancel }) {
      return (
        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6"><div className="bg-white p-8 rounded-[2.5rem] w-full max-w-xs text-center shadow-2xl animate-slide-up">
          <i className="fa-solid fa-circle-exclamation text-red-500 text-5xl mb-4"></i>
          <h3 className="font-black uppercase text-sm mb-2">{config.title}</h3>
          <p className="text-[10px] font-bold text-gray-500 mb-6">{config.message}</p>
          <div className="flex gap-2"><button onClick={onCancel} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-black uppercase text-[10px]">Batal</button><button onClick={onConfirm} className="flex-1 py-3 bg-red-600 text-white rounded-xl font-black uppercase text-[10px] shadow-lg">Hapus</button></div>
        </div></div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
