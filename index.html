<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDGETpro</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream:    #FAF7F0;
      --cream2:   #F2EDE0;
      --black:    #1A1A1A;
      --white:    #FFFFFF;
      --mint:     #5DD9A4;
      --mint-bg:  #C8F5E0;
      --lavender: #A89AF9;
      --lav-bg:   #E8E4FF;
      --yellow:   #F5C842;
      --yel-bg:   #FFF0A0;
      --red:      #F04D4D;
      --red-bg:   #FFE0E0;
      --border:   2px solid #1A1A1A;
      --shadow:   3px 3px 0 #1A1A1A;
      --shadow-lg:5px 5px 0 #1A1A1A;
      --radius:   18px;
      --radius-sm:12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #E8E2D4; font-family: 'Inter', sans-serif; color: var(--black); }
    #root { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--cream); position: relative; overflow: hidden; border-left: 2px solid #1A1A1A; border-right: 2px solid #1A1A1A; }
    * { -webkit-tap-highlight-color: transparent; }
    input, textarea, select { font-family: 'Inter', sans-serif; }
    button { cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp   { from { transform: translateY(110%); } to { transform: translateY(0); } }
    @keyframes slideLeft { from { transform: translateX(calc(-50% + 110%)); } to { transform: translateX(-50%); } }
    @keyframes pulse     { 0%,100%{ opacity:1 } 50%{ opacity:.3 } }
    @keyframes pop       { 0%{transform:scale(.9);opacity:0;} 60%{transform:scale(1.04);} 100%{transform:scale(1);opacity:1;} }
    .animate-fade-in    { animation: fadeIn 0.2s ease both; }
    .animate-slide-up   { animation: slideUp 0.32s cubic-bezier(.34,1.56,.64,1) both; }
    .animate-slide-left { animation: slideLeft 0.35s cubic-bezier(.34,1.56,.64,1) both; }
    .rcard    { background: var(--white); border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .rcard-sm { background: var(--white); border: var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow); }
    .rbtn { border: var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow); font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform .12s, box-shadow .12s; display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
    .rbtn:active { transform: translate(3px,3px); box-shadow: none; }
    .rbtn-yellow { background: var(--yellow); color: var(--black); }
    .rbtn-mint   { background: var(--mint);   color: var(--black); }
    .rbtn-lav    { background: var(--lavender); color: var(--black); }
    .rbtn-white  { background: var(--white);  color: var(--black); }
    .rbtn-black  { background: var(--black);  color: var(--white); }
    .rbtn-red    { background: var(--red);    color: var(--white); }
    .rbtn-full   { width:100%; height:52px; font-size:15px; border-radius:var(--radius-sm); }
    .rinput { background: var(--cream2); border: var(--border); border-radius: var(--radius-sm); height: 52px; padding: 0 14px; font-size: 14px; font-family: 'Space Mono', monospace; color: var(--black); width: 100%; outline: none; transition: box-shadow .15s; }
    .rinput:focus { box-shadow: var(--shadow); }
    .rinput::placeholder { color: #AAA; font-family: 'Inter', sans-serif; }
    .rtextarea { background: var(--cream2); border: var(--border); border-radius: var(--radius-sm); padding: 12px 14px; min-height: 80px; font-size: 14px; font-family: 'Inter', sans-serif; color: var(--black); width: 100%; outline: none; resize: none; transition: box-shadow .15s; }
    .rtextarea:focus { box-shadow: var(--shadow); }
    .rlabel { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--black); margin-bottom: 5px; display: block; letter-spacing: .04em; text-transform: uppercase; }
    .badge-base    { font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px; display:inline-block; border:1.5px solid var(--black); font-family:'Space Mono',monospace; }
    .badge-pending { background: var(--cream2); color: #666; }
    .badge-under   { background: var(--mint-bg); color: #0A5A3A; }
    .badge-on      { background: var(--lav-bg);  color: #3D34A0; }
    .badge-over    { background: var(--red-bg);  color: #8B1A1A; }
    .progress-track { height: 7px; background: var(--cream2); border-radius: 99px; border: 1.5px solid var(--black); overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 99px; transition: width .4s ease; }
    .tab-group { background: var(--cream2); border: var(--border); border-radius: 99px; padding: 3px; display: flex; box-shadow: var(--shadow); }
    .tab-item { flex: 1; height: 38px; border-radius: 99px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .18s; color: #888; }
    .tab-item.active { background: var(--black); color: var(--white); }
    .chip { padding: 6px 14px; border-radius: 99px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; white-space: nowrap; cursor: pointer; transition: all .15s; background: var(--cream2); color: #666; border: 1.5px solid #CCC; }
    .chip.active { background: var(--black); color: var(--white); border-color: var(--black); box-shadow: var(--shadow); }
    .sheet { width: 100%; max-width: 430px; margin: 0 auto; background: var(--cream); border-radius: 24px 24px 0 0; border: var(--border); border-bottom: none; max-height: 92vh; display: flex; flex-direction: column; }
    .sheet-handle { width: 40px; height: 4px; background: var(--black); border-radius: 99px; margin: 14px auto 18px; flex-shrink: 0; }
    .sheet-scroll { overflow-y: auto; padding: 0 20px 40px; flex: 1; }
    .sheet-title { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; padding: 0 20px; margin-bottom: 20px; flex-shrink: 0; }
    .sidebar-panel { position: fixed; top: 0; width: 100%; max-width: 430px; height: 100vh; background: var(--cream); border-left: var(--border); z-index: 201; display: flex; flex-direction: column; animation: slideLeft .35s cubic-bezier(.34,1.56,.64,1) both; left: 50%; transform: translateX(-50%); }
    .fab { position: fixed; bottom: 20px; right: max(16px, calc(50% - 215px + 16px)); background: var(--yellow); border: var(--border); border-radius: 99px; height: 52px; padding: 0 22px; display: flex; align-items: center; gap: 8px; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; color: var(--black); box-shadow: var(--shadow-lg); cursor: pointer; z-index: 50; transition: transform .12s, box-shadow .12s; }
    .fab:active { transform: translate(5px,5px); box-shadow: none; }
    .upload-area { border: 2px dashed var(--black); border-radius: var(--radius-sm); height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; background: var(--cream2); transition: background .15s; }
    .upload-area:hover { background: var(--yel-bg); }
    .dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--black); animation:pulse 1.2s ease infinite; }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    .skeleton { animation: pulse 1.4s ease-in-out infinite; background: var(--cream2); border-radius: 16px; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    @media print { .no-print { display: none !important; } }
    @media (min-width: 432px) { #root { box-shadow: 0 0 0 2px #1A1A1A, 8px 8px 0 #1A1A1A; margin-top: 24px; min-height: calc(100vh - 48px); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const SUPABASE_URL = 'https://wzhcyorshcxscgeajcgz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aGN5b3JzaGN4c2NnZWFqY2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDQxNTMsImV4cCI6MjA5MzEyMDE1M30.PJJJcqNpBlPW6DIQ3IyzxuIOF1ueSevqlohJ4FoTqz4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { useState, useEffect, useRef } = React;

    const FAIcon = ({ name, size = 20, className = "" }) => (
      <i className={`fa-solid fa-${name} ${className}`}
         style={{ fontSize: size, width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
      </i>
    );

    const Plus = (p) => <FAIcon name="plus" {...p} />;
    const FileText = (p) => <FAIcon name="file-lines" {...p} />;
    const Camera = (p) => <FAIcon name="camera" {...p} />;
    const Upload = (p) => <FAIcon name="upload" {...p} />;
    const CheckCircle = (p) => <FAIcon name="circle-check" {...p} />;
    const AlertCircle = (p) => <FAIcon name="circle-exclamation" {...p} />;
    const ArrowLeft = (p) => <FAIcon name="arrow-left" {...p} />;
    const ChevronRight = (p) => <FAIcon name="chevron-right" {...p} />;
    const Trash2 = (p) => <FAIcon name="trash-can" {...p} />;
    const Save = (p) => <FAIcon name="floppy-disk" {...p} />;
    const ImageIcon = (p) => <FAIcon name="image" {...p} />;
    const DollarSign = (p) => <FAIcon name="wallet" {...p} />;
    const TrendingDown = (p) => <FAIcon name="arrow-trend-down" {...p} />;
    const TrendingUp = (p) => <FAIcon name="arrow-trend-up" {...p} />;
    const Minus = (p) => <FAIcon name="minus" {...p} />;
    const Download = (p) => <FAIcon name="download" {...p} />;
    const Printer = (p) => <FAIcon name="file-pdf" {...p} />;
    const FileInvoice = (p) => <FAIcon name="file-invoice" {...p} />;
    const ExcelIcon = (p) => <FAIcon name="file-excel" {...p} />;
    const UserIcon = (p) => <FAIcon name="user" {...p} />;
    const LockIcon = (p) => <FAIcon name="lock" {...p} />;
    const LogOutIcon = (p) => <FAIcon name="right-from-bracket" {...p} />;

    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
    const displayDate = (start, end) => { if (!start) return '-'; if (!end || start === end) return start; return `${start} s/d ${end}`; };

    const WalletSVG = () => (
      <svg width="90" height="90" viewBox="0 0 110 110" fill="none">
        <rect x="8" y="28" width="94" height="62" rx="14" fill="#C8F5E0" stroke="#1A1A1A" strokeWidth="2"/>
        <rect x="8" y="28" width="94" height="24" rx="14" fill="#5DD9A4" stroke="#1A1A1A" strokeWidth="2"/>
        <rect x="8" y="40" width="94" height="12" fill="#5DD9A4"/>
        <rect x="62" y="52" width="32" height="22" rx="10" fill="#A89AF9" stroke="#1A1A1A" strokeWidth="2"/>
        <circle cx="78" cy="63" r="6" fill="#F5C842" stroke="#1A1A1A" strokeWidth="1.5"/>
        <rect x="28" y="8" width="38" height="24" rx="8" fill="#FFF0A0" stroke="#1A1A1A" strokeWidth="2"/>
        <rect x="34" y="14" width="26" height="4" rx="2" fill="#1A1A1A" opacity=".3"/>
        <rect x="34" y="22" width="16" height="4" rx="2" fill="#1A1A1A" opacity=".18"/>
      </svg>
    );

    function App() {
      const [projects, setProjects] = useState([]);
      const [users, setUsers] = useState([]);
      const [currentUser, setCurrentUser] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [activeProject, setActiveProject] = useState(null);
      const [showNewProjectModal, setShowNewProjectModal] = useState(false);
      const [showItemModal, setShowItemModal] = useState(false);
      const [showActualModal, setShowActualModal] = useState(false);
      const [showDetailSidebar, setShowDetailSidebar] = useState(false);
      const [showFullReportSidebar, setShowFullReportSidebar] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [deleteConfig, setDeleteConfig] = useState({ isOpen: false, type: '', payload: null, title: '', message: '' });

      const fetchUsers = async () => {
        const { data } = await supabase.from('users').select('*');
        if (data) setUsers(data);
      };

      const fetchProjects = async () => {
        const { data } = await supabase.from('projects').select('*').order('id', { ascending: false });
        if (data) setProjects(data);
        setIsInitializing(false);
      };

      useEffect(() => {
        const sessionUser = localStorage.getItem('budget_current_user');
        if (sessionUser) setCurrentUser(JSON.parse(sessionUser));
        fetchUsers();
        fetchProjects();
        const userSub = supabase.channel('users_changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, fetchUsers)
          .subscribe();
        const projectSub = supabase.channel('projects_changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, fetchProjects)
          .subscribe();
        return () => { supabase.removeChannel(userSub); supabase.removeChannel(projectSub); };
      }, []);

      useEffect(() => {
        if (activeProject) {
          const updated = projects.find(p => p.id === activeProject.id);
          if (updated) setActiveProject(updated);
        }
      }, [projects]);

      const handleLogin = async (username, password) => {
        if (users.length === 0 && username === 'admin' && password === 'admin123') {
          const defaultAdmin = { username: 'admin', password: 'admin123', role: 'admin' };
          await supabase.from('users').insert([defaultAdmin]);
          const userSession = { username: 'admin', role: 'admin' };
          setCurrentUser(userSession);
          localStorage.setItem('budget_current_user', JSON.stringify(userSession));
          setCurrentView('dashboard');
          return true;
        }
        const found = users.find(u => u.username === username && u.password === password);
        if (found) {
          const userSession = { username: found.username, role: found.role };
          setCurrentUser(userSession);
          localStorage.setItem('budget_current_user', JSON.stringify(userSession));
          setCurrentView('dashboard');
          return true;
        }
        return false;
      };

      const handleRegister = async (username, password, role) => {
        if (users.find(u => u.username === username)) return false;
        const newUser = { username, password, role };
        await supabase.from('users').insert([newUser]);
        const userSession = { username, role };
        setCurrentUser(userSession);
        localStorage.setItem('budget_current_user', JSON.stringify(userSession));
        setCurrentView('dashboard');
        return true;
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setActiveProject(null);
        setCurrentView('dashboard');
        localStorage.removeItem('budget_current_user');
      };

      const triggerDelete = (type, payload, title, message) => {
        setDeleteConfig({ isOpen: true, type, payload, title, message });
      };

      const executeDelete = async () => {
        const { type, payload } = deleteConfig;
        if (type === 'project') {
          await supabase.from('projects').delete().eq('id', payload);
          setProjects(prev => prev.filter(p => p.id !== payload));
          setActiveProject(null);
          setCurrentView('dashboard');
        } else if (type === 'item') {
          const updatedItems = activeProject.items.filter(i => i.id !== payload);
          const updatedProject = { ...activeProject, items: updatedItems };
          await supabase.from('projects').update({ items: updatedItems }).eq('id', updatedProject.id);
          setShowDetailSidebar(false);
          setShowItemModal(false);
        } else if (type === 'transaction') {
          const newActuals = payload.currentActuals.filter(a => a.id !== payload.trxId);
          await saveActualsToDB(payload.itemId, newActuals);
        }
        setDeleteConfig({ isOpen: false, type: '', payload: null, title: '', message: '' });
      };

      const handleUpdateProjectInfo = async (field, value) => {
        const updated = { ...activeProject, [field]: value };
        setActiveProject(updated);
        await supabase.from('projects').update({ [field]: value }).eq('id', updated.id);
      };

      const handleSaveItem = async (itemData) => {
        let updatedItems = [];
        if (itemData.id) {
          updatedItems = activeProject.items.map(i => i.id === itemData.id ? itemData : i);
        } else {
          updatedItems = [...activeProject.items, { ...itemData, id: Date.now().toString(), actuals: [], status: 'pending' }];
        }
        const updatedProject = { ...activeProject, items: updatedItems };
        await supabase.from('projects').update({ items: updatedItems }).eq('id', updatedProject.id);
        setShowItemModal(false);
      };

      const saveActualsToDB = async (itemId, newActuals) => {
        if (!activeProject || !activeProject.items) return;
        const plannedItem = activeProject.items.find(i => i.id === itemId);
        const plannedTotal = plannedItem.qty * plannedItem.budget;
        const actualTotal = newActuals.reduce((sum, act) => sum + Number(act.amount), 0);
        let status = 'pending';
        if (newActuals.length > 0) {
          status = actualTotal > plannedTotal ? 'over-budget' : (actualTotal < plannedTotal ? 'under-budget' : 'on-budget');
        }
        const updatedItems = activeProject.items.map(i => {
          if (i.id === itemId) return { ...i, actuals: newActuals, status: status };
          return i;
        });
        const { error } = await supabase.from('projects').update({ items: updatedItems }).eq('id', activeProject.id);
        if (error) { console.error("Gagal simpan:", error); alert("Gagal simpan ke server"); }
        else {
          setActiveProject(prev => ({ ...prev, items: updatedItems }));
          setProjects(prevProj => prevProj.map(p => p.id === activeProject.id ? { ...p, items: updatedItems } : p));
        }
      };

      const getItemActualTotal = (item) => {
        if (item.actuals && Array.isArray(item.actuals)) return item.actuals.reduce((sum, a) => sum + Number(a.amount), 0);
        return 0;
      };
      const calculateTotalPlan = (items) => items.reduce((sum, item) => sum + (item.qty * item.budget), 0);
      const calculateTotalActual = (items) => items.reduce((sum, item) => sum + getItemActualTotal(item), 0);

      const displayedProjects = currentUser?.role === 'admin' ? projects : projects.filter(p => p.owner === currentUser?.username);

      if (isInitializing) {
        return (
          <div style={{ minHeight:'100vh', background:'var(--cream)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:28 }}>
            <div style={{ position:'relative' }}>
              <div style={{ position:'absolute', inset:0, background:'var(--yellow)', borderRadius:20, transform:'rotate(-5deg)', border:'var(--border)' }}></div>
              <div style={{ position:'relative', background:'var(--cream)', border:'var(--border)', borderRadius:20, padding:'20px 24px', boxShadow:'var(--shadow-lg)' }}>
                <WalletSVG />
              </div>
            </div>
            <div style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:32, letterSpacing:'-1px' }}>
              BUDGET<span style={{ color:'var(--lavender)' }}>pro</span>
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <span className="dot"></span><span className="dot"></span><span className="dot"></span>
            </div>
          </div>
        );
      }

      const AuthScreen = () => {
        const [isLoginView, setIsLoginView] = useState(true);
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [isAdminReg, setIsAdminReg] = useState(false);
        const [error, setError] = useState('');
        const [showPassword, setShowPassword] = useState(false);

        const submitAuth = async () => {
          setError('');
          if (!username || !password) { setError('Username dan Password wajib diisi'); return; }
          if (isLoginView) {
            const success = await handleLogin(username, password);
            if (!success) setError('Username atau Password salah!');
          } else {
            const role = isAdminReg ? 'admin' : 'user';
            const success = await handleRegister(username, password, role);
            if (!success) setError('Username sudah digunakan!');
          }
        };

        return (
          <div style={{ minHeight:'100vh', background:'var(--cream)', display:'flex', flexDirection:'column' }}>
            <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'48px 24px 28px', gap:18 }}>
              <img src="logo-full.png" alt="BUDGETpro" style={{ width:220, height:'auto', display:'block' }} />
              <div style={{ fontSize:12, color:'#888', fontStyle:'italic', maxWidth:240, lineHeight:1.6, marginTop:4, textAlign:'center' }}>
                "semoga membantu kamu mempertanggungjawabkan budget yang sudah dibuat"
              </div>
            </div>

            <div className="animate-slide-up" style={{ background:'var(--cream)', borderRadius:'24px 24px 0 0', border:'var(--border)', borderBottom:'none', padding:'24px 22px 44px', boxShadow:'0 -4px 0 #1A1A1A' }}>
              <div className="tab-group" style={{ marginBottom:22 }}>
                <div className={`tab-item ${isLoginView ? 'active' : ''}`} onClick={() => { setIsLoginView(true); setError(''); }}>MASUK</div>
                <div className={`tab-item ${!isLoginView ? 'active' : ''}`} onClick={() => { setIsLoginView(false); setError(''); }}>DAFTAR</div>
              </div>

              {error && (
                <div style={{ background:'var(--red-bg)', border:'var(--border)', borderRadius:10, padding:'10px 14px', fontSize:12, fontFamily:'Space Mono,monospace', fontWeight:700, display:'flex', alignItems:'center', gap:8, boxShadow:'2px 2px 0 #1A1A1A', marginBottom:14 }}>
                  <i className="fa-solid fa-triangle-exclamation"></i> {error}
                </div>
              )}

              <label className="rlabel" htmlFor="auth-username">USERNAME</label>
              <input id="auth-username" name="username" type="text" className="rinput" style={{ marginBottom:14 }}
                value={username} onChange={e => setUsername(e.target.value)}
                placeholder="Masukkan username" autoComplete="username" />

              <label className="rlabel" htmlFor="auth-password">PASSWORD</label>

          const wsData = [
            ["Item","Qty","Unit","Budget Satuan","Keterangan"],
            ["Hotel",1,"malam",350000,"Contoh: Hotel untuk tim"],
            ["Tiket Pesawat",2,"orang",1500000,"Contoh: PP Jakarta"]

          const ws = XLSX.utils.aoa_to_sheet(wsData);
          ws['!cols'] = [{wch:25},{wch:8},{wch:12},{wch:18},{wch:35}];
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Template Budget");
          XLSX.writeFile(wb, "Template_BUDGETpro.xlsx");
        };

        const handleImportExcel = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (evt) => {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type:'binary' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const data = XLSX.utils.sheet_to_json(ws);
            const importedItems = data.map((row, idx) => ({
              id: Date.now().toString() + '_' + idx,
              name: row['Item'] || row['Nama Item'] || 'Item '+(idx+1),
              qty: Number(row['Qty'] || row['Jumlah'] || 1),
              unit: row['Unit'] || row['Satuan'] || 'paket',
              budget: Number(row['Budget Satuan'] || row['Budget'] || row['Harga'] || 0),
              notes: row['Keterangan'] || row['Catatan'] || '',
              actuals: [], status: 'pending'
            }));
            const newProject = { id: Date.now().toString(), name: formData.name || 'Project Hasil Import', target: formData.target || '', startDate: formData.startDate, endDate: formData.endDate, owner: currentUser.username, items: importedItems };
            const { data: insertedData } = await supabase.from('projects').insert([newProject]).select();
            const savedProject = (insertedData && insertedData[0]) ? insertedData[0] : newProject;
            setProjects(prev => [savedProject, ...prev.filter(p => p.id !== savedProject.id)]);
            setActiveProject(savedProject);
            setShowNewProjectModal(false);
            setCurrentView('project_detail');
          };
          reader.readAsBinaryString(file);
        };

        const handleCreateManual = async () => {
          if (!formData.name) return alert("Nama Event wajib diisi!");
          const newProject = { id: Date.now().toString(), name: formData.name, target: formData.target || '', startDate: formData.startDate, endDate: formData.endDate, owner: currentUser.username, items: [] };
          const { data, error } = await supabase.from('projects').insert([newProject]).select();
          if (error) { console.error("Error Simpan:", error); alert("Gagal simpan ke server: " + error.message); }
          else {
            const savedProject = (data && data[0]) ? data[0] : newProject;
            setProjects(prev => [savedProject, ...prev.filter(p => p.id !== savedProject.id)]);
            setActiveProject(savedProject);
            setShowNewProjectModal(false);
            setCurrentView('project_detail');
          }
        };

        return (
          <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.5)', zIndex:100, display:'flex', alignItems:'flex-end', animation:'fadeIn .2s ease' }} className="no-print" onClick={() => setShowNewProjectModal(false)}>

                <div style={{ display:'flex', gap:12, marginBottom:14 }}>

                    <label className="rlabel" htmlFor="proj-start">MULAI</label>
                    <input id="proj-start" name="proj-start" type="date" className="rinput" style={{ fontSize:13, padding:'0 10px', width:'100%', boxSizing:'border-box', display:'block' }}
                      value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} />
                  </div>
                  <div style={{ flex:'0 0 calc(50% - 6px)', width:'calc(50% - 6px)', overflow:'hidden' }}>
                    <label className="rlabel" htmlFor="proj-end">SELESAI</label>
                    <input id="proj-end" name="proj-end" type="date" className="rinput" style={{ fontSize:13, padding:'0 10px', width:'100%', boxSizing:'border-box', display:'block' }}
                      value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} />
                  </div>

                  <button className="rbtn rbtn-black rbtn-full" style={{ marginBottom:12 }} onClick={handleCreateManual}>

                  </label>

            </div>

                const progressPct = totalPlan > 0 ? Math.min((totalActual/totalPlan)*100, 100) : 0;

          csvContent += `Event / Trip:,${activeProject.name}\n`;
          csvContent += `Pembuat:,${activeProject.owner}\n`;
          csvContent += `Tanggal:,${displayDate(activeProject.startDate, activeProject.endDate)}\n`;
          csvContent += `Target:,${(activeProject.target || '').replace(/,/g, ";")}\n\n`;
          csvContent += "No,Item,Qty,Unit,Budget Satuan,Total Rencana,Total Aktual (LPJ),Sisa/Over,Status,Keterangan\n";
          activeProject.items.forEach((item, index) => {
            const plan = item.qty * item.budget;
            const actual = getItemActualTotal(item);
            const varianceItem = plan - actual;
            const notes = (item.notes || '').replace(/,/g, ";");
            const name = (item.name || '').replace(/,/g, ";");
            csvContent += `${index+1},${name},${item.qty},${item.unit},${item.budget},${plan},${actual},${varianceItem},${item.status},${notes}\n`;
          });
          csvContent += "\n\n--- DETAIL TRANSAKSI AKTUAL ---\n";
          csvContent += "Item Budget,Nominal (Rp),Keterangan Transaksi\n";

                csvContent += `${(item.name || '').replace(/,/g, ";")},${act.amount},${(act.description || '').replace(/,/g, ";")}\n`;

            }
          });
          if (!hasDetails) csvContent += "Belum ada transaksi aktual\n";

          const link = document.createElement("a");

                  <div style={{ flex:'0 0 calc(50% - 6px)', width:'calc(50% - 6px)', overflow:'hidden' }}>
                    <label className="rlabel" htmlFor="detail-start">MULAI</label>
                    <input id="detail-start" name="detail-start" type="date" className="rinput" style={{ fontSize:13, padding:'0 10px', width:'100%', boxSizing:'border-box', display:'block' }}
                      value={activeProject.startDate || ''} onChange={(e) => handleUpdateProjectInfo('startDate', e.target.value)} disabled={isReadonly} />
                  </div>
                  <div style={{ flex:'0 0 calc(50% - 6px)', width:'calc(50% - 6px)', overflow:'hidden' }}>
                    <label className="rlabel" htmlFor="detail-end">SELESAI</label>
                    <input id="detail-end" name="detail-end" type="date" className="rinput" style={{ fontSize:13, padding:'0 10px', width:'100%', boxSizing:'border-box', display:'block' }}
                      value={activeProject.endDate || ''} onChange={(e) => handleUpdateProjectInfo('endDate', e.target.value)} disabled={isReadonly} />
                  </div>
                </div>
                <div>
                  <label className="rlabel" htmlFor="detail-target">TARGET / TUJUAN</label>
                  <textarea id="detail-target" name="detail-target" className="rtextarea"
                    value={localTarget}
                    onChange={(e) => setLocalTarget(e.target.value)}
                    onBlur={() => { if (localTarget !== (activeProject.target || '')) handleUpdateProjectInfo('target', localTarget); }}
                    rows="2" placeholder="Tujuan perjalanan..." disabled={isReadonly} />
                </div>
              </div>
            </div>

            <div style={{ padding:'16px 16px 0' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
                <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:15, margin:0 }}>Rincian Budget</p>
                <span style={{ fontFamily:'Space Mono,monospace', fontSize:11, fontWeight:700, background:'var(--cream2)', border:'1.5px solid #CCC', borderRadius:99, padding:'3px 10px' }}>
                  {activeProject.items.length} Item
                </span>
              </div>

              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                {activeProject.items.map((item) => {
                  const itemPlanTotal = item.qty * item.budget;
                  const itemActual = getItemActualTotal(item);
                  const itemProgress = itemPlanTotal > 0 ? Math.min((itemActual/itemPlanTotal)*100, 100) : 0;
                  const slab = item.status === 'under-budget' ? 'var(--mint)' : item.status === 'over-budget' ? 'var(--red)' : item.status === 'on-budget' ? 'var(--lavender)' : '#CCC';

                  return (
                    <div key={item.id}
                      onClick={() => { setSelectedItem(item); setShowDetailSidebar(true); }}
                      style={{ background:'var(--white)', border:'var(--border)', borderRadius:16, boxShadow:'var(--shadow-lg)', cursor:'pointer', display:'flex', overflow:'hidden', transition:'transform .12s' }}
                      onMouseDown={e => e.currentTarget.style.transform='scale(0.98)'}
                      onMouseUp={e => e.currentTarget.style.transform=''}
                      onTouchStart={e => e.currentTarget.style.transform='scale(0.98)'}
                      onTouchEnd={e => e.currentTarget.style.transform=''}
                    >
                      <div style={{ width:8, background:slab, flexShrink:0 }}></div>
                      <div style={{ flex:1, padding:'12px 12px 12px 10px', minWidth:0 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8, marginBottom:4 }}>
                          <div style={{ flex:1, minWidth:0 }}>
                            <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:14, margin:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.name}</p>
                            <p style={{ fontSize:11, color:'#999', margin:'2px 0 0' }}>{item.qty} {item.unit} &times; {formatRp(item.budget)}</p>
                          </div>
                          <span className={`badge-base ${item.status === 'under-budget' ? 'badge-under' : item.status === 'over-budget' ? 'badge-over' : item.status === 'on-budget' ? 'badge-on' : 'badge-pending'}`} style={{ flexShrink:0 }}>
                            {item.status === 'pending' ? 'Pending' : item.status === 'under-budget' ? 'Under' : item.status === 'on-budget' ? 'On Budget' : 'Over'}
                          </span>
                        </div>

                        <div className="progress-track" style={{ margin:'8px 0' }}>
                          <div className="progress-fill" style={{ width:`${itemProgress}%`, background: item.status === 'over-budget' ? 'var(--red)' : item.status === 'pending' ? '#CCC' : 'var(--mint)' }}></div>
                        </div>

                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:12, marginBottom:6 }}>
                          <span style={{ color:'#999' }}>Aktual ({item.actuals?.length || 0} Trx)</span>
                          <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700, color: item.status === 'pending' ? '#AAA' : item.status === 'over-budget' ? 'var(--red)' : 'var(--black)' }}>
                            {item.status === 'pending' ? 'Belum Input' : formatRp(itemActual)}
                          </span>
                        </div>

                        {item.actuals && item.actuals.filter(a => a.receiptUrl).length > 0 && (
                          <div style={{ display:'flex', marginBottom:6 }}>
                            {item.actuals.filter(a => a.receiptUrl).slice(0,3).map((act, idx) => (
                              <div key={idx} style={{ width:28, height:28, borderRadius:'50%', border:'2px solid var(--black)', overflow:'hidden', marginLeft: idx===0 ? 0 : -8, background:'var(--cream2)' }}>
                                <img src={act.receiptUrl} style={{ width:'100%', height:'100%', objectFit:'cover' }} alt="struk" />
                              </div>
                            ))}
                            {item.actuals.filter(a => a.receiptUrl).length > 3 && (
                              <div style={{ width:28, height:28, borderRadius:'50%', border:'2px solid var(--black)', marginLeft:-8, background:'var(--cream2)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Space Mono,monospace', fontSize:9, fontWeight:700 }}>
                                +{item.actuals.filter(a => a.receiptUrl).length - 3}
                              </div>
                            )}
                          </div>
                        )}

                        {item.notes && <p style={{ fontSize:11, color:'#999', fontStyle:'italic', marginBottom:6 }}>Ket: {item.notes}</p>}

                        {!isReadonly && (
                          <div style={{ display:'flex', gap:8, paddingTop:10, borderTop:'1.5px solid var(--cream2)' }} className="no-print">
                            <button className="rbtn rbtn-mint" style={{ flex:1, height:34, fontSize:11, borderRadius:10 }}
                              onClick={(e) => { e.stopPropagation(); setSelectedItem(item); setShowActualModal(true); }}>
                              <Camera size={12} /> Input Aktual
                            </button>
                            <button className="rbtn rbtn-white" style={{ width:36, height:34, borderRadius:10, padding:0 }}
                              onClick={(e) => { e.stopPropagation(); setSelectedItem(item); setShowItemModal(true); }}>
                              <FAIcon name="pen" size={12} />
                            </button>
                            <button className="rbtn rbtn-red" style={{ width:36, height:34, borderRadius:10, padding:0 }}
                              onClick={(e) => { e.stopPropagation(); triggerDelete('item', item.id, 'Hapus Item Biaya?', `Anda yakin ingin menghapus '${item.name}' beserta seluruh struknya?`); }}>
                              <Trash2 size={12} />
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {!isReadonly && (
              <button className="fab no-print" onClick={() => { setSelectedItem(null); setShowItemModal(true); }}>
                <Plus size={18} /> Item
              </button>
            )}
          </div>
        );
      };

      const ItemPlanModal = () => {
        const [formData, setFormData] = useState(selectedItem || { name:'', qty:1, unit:'orang', budget:0, notes:'' });

        return (
          <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.5)', zIndex:100, display:'flex', alignItems:'flex-end', animation:'fadeIn .2s ease' }} className="no-print" onClick={() => setShowItemModal(false)}>
            <div className="sheet animate-slide-up" onClick={e => e.stopPropagation()}>
              <div className="sheet-handle"></div>
              <div className="sheet-title">{selectedItem ? 'EDIT RENCANA' : 'TAMBAH RENCANA'}</div>
              <div className="sheet-scroll">
                <label className="rlabel" htmlFor="item-name">NAMA ITEM / PENGELUARAN</label>
                <input id="item-name" name="item-name" className="rinput" style={{ marginBottom:14 }}
                  value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="Cth: Tiket Pesawat, Hotel..." />

                <div style={{ display:'grid', gridTemplateColumns:'1fr 2fr', gap:12, marginBottom:14 }}>
                  <div>
                    <label className="rlabel" htmlFor="item-qty">QTY</label>
                    <input id="item-qty" name="item-qty" type="number" min="1" className="rinput"
                      value={formData.qty || ''} onChange={e => setFormData({...formData, qty: Number(e.target.value)})} />
                  </div>
                  <div>
                    <label className="rlabel" htmlFor="item-unit">SATUAN</label>
                    <input id="item-unit" name="item-unit" className="rinput"
                      value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} placeholder="org / mlm / tiket" />
                  </div>
                </div>

                <label className="rlabel" htmlFor="item-budget">BUDGET SATUAN (Rp)</label>
                <input id="item-budget" name="item-budget" type="number" className="rinput" style={{ marginBottom:14 }}
                  value={formData.budget || ''} onChange={e => setFormData({...formData, budget: Number(e.target.value)})} placeholder="0" />

                <div className="rcard-sm" style={{ padding:'12px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14, background:'var(--mint-bg)' }}>
                  <span style={{ fontFamily:'Space Mono,monospace', fontSize:11, color:'#555' }}>TOTAL RENCANA</span>
                  <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:18 }}>{formatRp((formData.qty||0)*(formData.budget||0))}</span>
                </div>

                <label className="rlabel" htmlFor="item-notes">CATATAN (OPSIONAL)</label>
                <textarea id="item-notes" name="item-notes" className="rtextarea" style={{ marginBottom:20 }}
                  rows="2" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} placeholder="Untuk siapa/keperluan spesifik..." />

                <div style={{ display:'flex', gap:10 }}>
                  <button className="rbtn rbtn-white" style={{ flex:1, height:48 }} onClick={() => setShowItemModal(false)}>BATAL</button>
                  <button className="rbtn rbtn-black" style={{ flex:2, height:48 }} onClick={() => handleSaveItem(formData)}>SIMPAN RENCANA</button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const ActualInputModal = () => {
        const [actuals, setActuals] = useState(selectedItem?.actuals || []);
        const [newAmount, setNewAmount] = useState('');
        const [newDesc, setNewDesc] = useState('');
        const [receiptUrl, setReceiptUrl] = useState(null);
        const [isUploading, setIsUploading] = useState(false);

        const plannedTotal = selectedItem ? (selectedItem.qty * selectedItem.budget) : 0;
        const draftTotal = actuals.reduce((sum, act) => sum + Number(act.amount), 0);
        const variance = plannedTotal - draftTotal;

        const handleFileChange = (e) => {
          const file = e.target.files[0];
          if (file) { const reader = new FileReader(); reader.onloadend = () => setReceiptUrl(reader.result); reader.readAsDataURL(file); }
        };

        const handleAddTransaction = async () => {
          const numericAmount = Number(newAmount.replace(/\./g, ''));
          if (!numericAmount || numericAmount <= 0) return;
          setIsUploading(true);
          let finalUrl = receiptUrl;
          try {
            if (receiptUrl && receiptUrl.startsWith('data:')) {
              const res = await fetch(receiptUrl);
              const blob = await res.blob();
              const fileName = `${activeProject.id}/${selectedItem.id}_${Date.now()}.jpg`;
              const { data, error } = await supabase.storage.from('receipts').upload(fileName, blob, { contentType:'image/jpeg' });
              if (error) throw error;
              const { data: publicUrlData } = supabase.storage.from('receipts').getPublicUrl(fileName);
              finalUrl = publicUrlData.publicUrl;
            }
            const newAct = { id: Date.now().toString(), amount: numericAmount, description: newDesc, receiptUrl: finalUrl };
            setActuals([...actuals, newAct]);
            setNewAmount(''); setNewDesc(''); setReceiptUrl(null);
          } catch (error) { alert("Gagal mengunggah foto."); console.error(error); }
          setIsUploading(false);
        };

        return (
          <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.55)', zIndex:100, display:'flex', alignItems:'flex-end', animation:'fadeIn .2s ease' }} className="no-print" onClick={() => setShowActualModal(false)}>
            <div className="sheet animate-slide-up" style={{ maxHeight:'95vh' }} onClick={e => e.stopPropagation()}>
              <div className="sheet-handle"></div>
              <div style={{ padding:'0 20px', marginBottom:14, flexShrink:0 }}>
                <p style={{ fontFamily:'Space Mono,monospace', fontSize:10, color:'#888', margin:'0 0 2px' }}>KELOLA TRANSAKSI LPJ</p>
                <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:17, margin:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{selectedItem?.name}</p>
              </div>

              <div className="sheet-scroll" style={{ paddingTop:0 }}>
                <div className="rcard-sm" style={{ padding:'12px 14px', marginBottom:14, background:'var(--mint-bg)' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                    <span style={{ fontFamily:'Space Mono,monospace', fontSize:10, color:'#555' }}>RENCANA</span>
                    <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:13 }}>{formatRp(plannedTotal)}</span>
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                    <span style={{ fontFamily:'Space Mono,monospace', fontSize:10, color:'#555' }}>TERPAKAI</span>
                    <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:13, color:'var(--lavender)' }}>{formatRp(draftTotal)}</span>
                  </div>
                  <div style={{ borderTop:'1.5px solid rgba(0,0,0,.1)', paddingTop:6, display:'flex', justifyContent:'space-between', fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:12, color: variance >= 0 ? 'var(--black)' : 'var(--red)' }}>
                    <span>{variance >= 0 ? 'SISA:' : 'OVER:'}</span>
                    <span>{formatRp(Math.abs(variance))}</span>
                  </div>
                </div>

                {actuals.length > 0 && (
                  <div style={{ marginBottom:14, display:'flex', flexDirection:'column', gap:8 }}>
                    {actuals.map((act) => (
                      <div key={act.id} className="rcard-sm" style={{ display:'flex', gap:10, alignItems:'center', padding:10 }}>
                        {act.receiptUrl ? (
                          <div style={{ width:44, height:44, borderRadius:8, overflow:'hidden', border:'var(--border)', flexShrink:0 }}>
                            <img src={act.receiptUrl} style={{ width:'100%', height:'100%', objectFit:'cover' }} alt="struk" />
                          </div>
                        ) : (
                          <div style={{ width:44, height:44, borderRadius:8, background:'var(--cream2)', border:'var(--border)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                            <i className="fa-solid fa-file-invoice" style={{ fontSize:18, color:'#AAA' }}></i>
                          </div>
                        )}
                        <div style={{ flex:1, minWidth:0 }}>
                          <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:13, margin:0 }}>{formatRp(act.amount)}</p>
                          <p style={{ fontSize:11, color:'#999', margin:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{act.description || 'Tanpa keterangan'}</p>
                        </div>
                        <button onClick={() => setActuals(actuals.filter(a => a.id !== act.id))}
                          style={{ color:'var(--red)', padding:6, background:'var(--red-bg)', border:'1.5px solid var(--red)', borderRadius:8, cursor:'pointer' }}>
                          <i className="fa-solid fa-trash-can" style={{ fontSize:12 }}></i>
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                <div className="rcard-sm" style={{ padding:14, marginBottom:14 }}>
                  <label className="rlabel" htmlFor="trx-amount">NOMINAL (Rp)</label>
                  <input id="trx-amount" name="trx-amount" type="text" inputMode="numeric" className="rinput" style={{ marginBottom:12 }}
                    value={newAmount}
                    onChange={e => { const raw = e.target.value.replace(/\D/g,''); setNewAmount(raw === '' ? '' : parseInt(raw).toLocaleString('id-ID')); }}
                    placeholder="0" />

                  <label className="rlabel" htmlFor="trx-desc">KETERANGAN</label>
                  <input id="trx-desc" name="trx-desc" type="text" className="rinput" style={{ marginBottom:12 }}
                    value={newDesc} onChange={e => setNewDesc(e.target.value)} placeholder="Cth: Bayar tol, makan siang..." />

                  {receiptUrl ? (
                    <div style={{ position:'relative', borderRadius:10, overflow:'hidden', border:'var(--border)', marginBottom:12 }}>
                      <img src={receiptUrl} style={{ width:'100%', height:160, objectFit:'cover', display:'block' }} alt="preview" />
                      <div style={{ position:'absolute', top:8, left:8, background:'var(--mint)', border:'var(--border)', borderRadius:99, padding:'3px 10px', fontSize:10, fontFamily:'Space Mono,monospace', fontWeight:700, display:'flex', alignItems:'center', gap:4 }}>
                        <FAIcon name="circle-check" size={10} /> Foto siap
                      </div>
                      <button onClick={() => setReceiptUrl(null)}
                        style={{ position:'absolute', top:8, right:8, width:30, height:30, background:'var(--red)', border:'var(--border)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'white' }}>
                        <FAIcon name="xmark" size={13} />
                      </button>
                    </div>
                  ) : (
                    <div style={{ marginBottom:12 }}>
                      <p className="rlabel">FOTO STRUK (OPSIONAL)</p>
                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                        <label className="upload-area">
                          <Camera size={20} />
                          <span style={{ fontFamily:'Space Mono,monospace', fontSize:11, fontWeight:700 }}>Kamera</span>
                          <input id="receipt-camera" name="receipt-camera" type="file" accept="image/*" capture="environment" style={{ display:'none' }} onChange={handleFileChange} />
                        </label>
                        <label className="upload-area">
                          <Upload size={20} />
                          <span style={{ fontFamily:'Space Mono,monospace', fontSize:11, fontWeight:700 }}>Galeri</span>
                          <input id="receipt-gallery" name="receipt-gallery" type="file" accept="image/*" style={{ display:'none' }} onChange={handleFileChange} />
                        </label>
                      </div>
                    </div>
                  )}

                  <button className="rbtn rbtn-lav rbtn-full" onClick={handleAddTransaction} disabled={!newAmount || isUploading}
                    style={{ opacity: (!newAmount || isUploading) ? 0.5 : 1 }}>
                    {isUploading ? (
                      <><i className="fa-solid fa-spinner fa-spin"></i> Mengunggah...</>
                    ) : (
                      <><FAIcon name="plus" size={14} /> Tambah ke Daftar {receiptUrl && <span style={{ background:'rgba(0,0,0,.15)', borderRadius:99, padding:'1px 7px', fontSize:10 }}>+foto</span>}</>
                    )}
                  </button>
                </div>

                <div style={{ display:'flex', gap:10, paddingBottom:10 }}>
                  <button className="rbtn rbtn-white" style={{ padding:'0 20px', height:48 }} onClick={() => setShowActualModal(false)}>BATAL</button>
                  <button className="rbtn rbtn-mint" style={{ flex:1, height:48 }}
                    onClick={async () => {
                      if (actuals.length === 0) { if (!confirm("Belum ada transaksi diinput, simpan sebagai kosong?")) return; }
                      await saveActualsToDB(selectedItem.id, actuals);
                      setShowActualModal(false);
                    }}>
                    <CheckCircle size={16} /> Simpan LPJ
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const ItemDetailSidebar = () => {
        if (!selectedItem) return null;
        const planTotal = selectedItem.qty * selectedItem.budget;
        const actualTotal = getItemActualTotal(selectedItem);
        const variance = planTotal - actualTotal;
        const isReadonly = currentUser.role === 'admin' && activeProject?.owner !== currentUser.username;

        return (
          <div style={{ position:'fixed', inset:0, zIndex:150, background:'rgba(0,0,0,.5)' }} className="animate-fade-in no-print" onClick={() => setShowDetailSidebar(false)}>
            <div className="sidebar-panel" onClick={e => e.stopPropagation()}>
              <div style={{ background:'var(--lav-bg)', borderBottom:'var(--border)', padding:'52px 20px 16px', flexShrink:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <button onClick={() => setShowDetailSidebar(false)}
                    style={{ width:36, height:36, borderRadius:'50%', background:'var(--white)', border:'var(--border)', boxShadow:'var(--shadow)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    <i className="fa-solid fa-arrow-left" style={{ fontSize:14 }} />
                  </button>
                  <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:15, margin:0, flex:1 }}>Rincian &amp; Riwayat</p>
                </div>
              </div>

              <div style={{ flex:1, overflowY:'auto', padding:20 }}>
                <div style={{ marginBottom:16 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10, marginBottom:8 }}>
                    <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:18, margin:0, flex:1, lineHeight:1.3 }}>{selectedItem.name}</p>
                    <span className={`badge-base ${selectedItem.status === 'under-budget' ? 'badge-under' : selectedItem.status === 'over-budget' ? 'badge-over' : selectedItem.status === 'on-budget' ? 'badge-on' : 'badge-pending'}`} style={{ flexShrink:0 }}>
                      {selectedItem.status === 'pending' ? 'Pending' : selectedItem.status === 'under-budget' ? 'Aman' : selectedItem.status === 'over-budget' ? 'Over' : 'Pas'}
                    </span>
                  </div>
                  <span style={{ fontFamily:'Space Mono,monospace', fontSize:12, background:'var(--cream2)', border:'1.5px solid #CCC', borderRadius:8, padding:'4px 10px', display:'inline-block' }}>
                    {selectedItem.qty} {selectedItem.unit} &times; {formatRp(selectedItem.budget)}
                  </span>
                  {selectedItem.notes && (
                    <div style={{ marginTop:10, background:'var(--yel-bg)', border:'1.5px solid var(--black)', borderRadius:10, padding:'10px 12px', display:'flex', gap:8, alignItems:'flex-start' }}>
                      <FileText size={14} />
                      <p style={{ fontSize:13, fontStyle:'italic', margin:0, lineHeight:1.4 }}>{selectedItem.notes}</p>
                    </div>
                  )}
                </div>

                <div className="rcard" style={{ padding:16, marginBottom:16 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}>
                    <span style={{ fontFamily:'Space Mono,monospace', fontSize:11, color:'#888' }}>BUDGET RENCANA</span>
                    <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:15 }}>{formatRp(planTotal)}</span>
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:12 }}>
                    <span style={{ fontFamily:'Space Mono,monospace', fontSize:11, color:'#888' }}>TERPAKAI</span>
                    <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:18, color:'var(--lavender)' }}>{formatRp(actualTotal)}</span>
                  </div>
                  <div style={{ borderTop:'var(--border)', paddingTop:10, display:'flex', justifyContent:'space-between', fontFamily:'Space Mono,monospace', fontWeight:700, color: variance >= 0 ? 'var(--black)' : 'var(--red)' }}>
                    <span style={{ fontSize:11 }}>{variance >= 0 ? 'SISA (AMAN)' : 'KURANG (OVER)'}</span>
                    <span style={{ fontSize:16 }}>{formatRp(Math.abs(variance))}</span>
                  </div>
                </div>

                <div>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                    <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:14, margin:0 }}>Riwayat</p>
                    <span style={{ fontFamily:'Space Mono,monospace', fontSize:10, fontWeight:700, background:'var(--lav-bg)', border:'1.5px solid var(--black)', borderRadius:99, padding:'3px 10px' }}>
                      {selectedItem.actuals?.length || 0} TRX
                    </span>
                  </div>
                  {selectedItem.actuals && selectedItem.actuals.length > 0 ? (
                    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                      {selectedItem.actuals.map((act, idx) => (
                        <div key={idx} className="rcard-sm" style={{ display:'flex', gap:12, alignItems:'center', padding:12 }}>
                          {act.receiptUrl ? (
                            <a href={act.receiptUrl} target="_blank" rel="noreferrer" style={{ width:52, height:52, flexShrink:0, borderRadius:10, overflow:'hidden', border:'var(--border)', display:'block' }}>
                              <img src={act.receiptUrl} alt="struk" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                            </a>
                          ) : (
                            <div style={{ width:52, height:52, flexShrink:0, borderRadius:10, background:'var(--cream2)', border:'var(--border)', display:'flex', alignItems:'center', justifyContent:'center', color:'#AAA' }}>
                              <FileText size={20} />
                            </div>
                          )}
                          <div style={{ flex:1, minWidth:0 }}>
                            <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:15, margin:'0 0 2px' }}>{formatRp(act.amount)}</p>
                            <p style={{ fontSize:12, color:'#999', margin:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                              {act.description || <span style={{ fontStyle:'italic' }}>Tanpa keterangan</span>}
                            </p>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div style={{ textAlign:'center', padding:'32px 20px', border:'2px dashed #CCC', borderRadius:16 }}>
                      <p style={{ fontFamily:'Space Mono,monospace', fontSize:13, color:'#AAA', margin:0 }}>Belum ada transaksi</p>
                      {!isReadonly && <p style={{ fontSize:11, color:'#BBB', margin:'4px 0 0' }}>Tap tombol di bawah untuk mengisi LPJ</p>}
                    </div>
                  )}
                </div>
              </div>

              {!isReadonly && (
                <div style={{ padding:16, borderTop:'var(--border)', flexShrink:0 }}>
                  <button className="rbtn rbtn-yellow rbtn-full" onClick={() => { setShowDetailSidebar(false); setShowActualModal(true); }}>
                    <Plus size={16} /> Tambah Transaksi LPJ Baru
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      };

      const FullReportSidebar = () => {
        const [isExporting, setIsExporting] = useState(false);
        if (!activeProject) return null;

        const totalPlan = calculateTotalPlan(activeProject.items);
        const totalActual = calculateTotalActual(activeProject.items);
        const variance = totalPlan - totalActual;

        const attachments = [];
        activeProject.items.forEach((item, itemIdx) => {
          if (item.actuals && item.actuals.length > 0) {
            item.actuals.forEach((act) => {
              if (act.receiptUrl) attachments.push({ itemNo:itemIdx+1, itemName:item.name, desc:act.description||'Tanpa keterangan', amount:act.amount, url:act.receiptUrl });
            });
          }
        });

        const handleExportPDF = () => {
          setIsExporting(true);
          setTimeout(() => {
            const element = document.getElementById('pdf-report-content');
            const opt = {
              margin: [15,10,15,10],
              filename: `LPJ_${activeProject.name.replace(/\s+/g,'_')}.pdf`,
              image: { type:'jpeg', quality:0.98 },
              html2canvas: { scale:2, useCORS:true },
              jsPDF: { unit:'mm', format:'a4', orientation:'portrait' },
              pagebreak: { mode:['css','legacy'] }
            };
            window.html2pdf().set(opt).from(element).save().then(() => setIsExporting(false)).catch(err => { console.error("Gagal export PDF:", err); setIsExporting(false); alert("Terjadi kesalahan saat memproses PDF."); });
          }, 300);
        };

        return (
          <div className="sidebar-panel" style={{ zIndex:150 }}>
            <div style={{ background:'var(--lavender)', borderBottom:'var(--border)', padding:'52px 20px 20px', flexShrink:0 }}>
              <p style={{ fontFamily:'Space Mono,monospace', fontSize:10, color:'rgba(0,0,0,.5)', letterSpacing:'.08em', margin:'0 0 4px' }}>LAPORAN PERTANGGUNGJAWABAN</p>
              <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:18, margin:'0 0 14px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{activeProject.name}</p>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={() => setShowFullReportSidebar(false)} className="rbtn rbtn-white" style={{ height:36, padding:'0 14px', fontSize:12 }}>
                  <i className="fa-solid fa-arrow-left" style={{ fontSize:12 }}></i> Kembali
                </button>
                <button onClick={handleExportPDF} disabled={isExporting} className="rbtn rbtn-yellow" style={{ height:36, padding:'0 14px', fontSize:12, opacity: isExporting ? 0.7 : 1 }}>
                  {isExporting ? <><i className="fa-solid fa-spinner fa-spin"></i> Menyiapkan...</> : <><Printer size={13} /> Cetak PDF</>}
                </button>
              </div>
            </div>

            <div style={{ flex:1, overflowY:'auto' }}>
              <div id="pdf-report-content" style={{ padding:20, background:'white' }}>
                <div style={{ textAlign:'center', marginBottom:24, borderBottom:'2px solid black', paddingBottom:20 }}>
                  <h1 style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:20, textTransform:'uppercase', margin:'0 0 6px' }}>{activeProject.name}</h1>
                  <p style={{ fontSize:13, color:'#555', margin:'0 0 2px' }}>Tanggal: {displayDate(activeProject.startDate, activeProject.endDate)}</p>
                  <p style={{ fontSize:13, color:'#555', margin:0 }}>PJ Program: {activeProject.owner}</p>
                  {activeProject.target && (
                    <p style={{ fontSize:12, marginTop:10, fontStyle:'italic', border:'1px solid #CCC', padding:'8px 12px', borderRadius:8 }}>Target: {activeProject.target}</p>
                  )}
                </div>

                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:24 }}>
                  <div style={{ border:'1.5px solid black', padding:14, borderRadius:10, textAlign:'center' }}>
                    <p style={{ fontFamily:'Space Mono,monospace', fontSize:10, color:'#666', margin:'0 0 4px', textTransform:'uppercase' }}>Total Rencana</p>
                    <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:18, margin:0 }}>{formatRp(totalPlan)}</p>
                  </div>
                  <div style={{ border:'1.5px solid black', padding:14, borderRadius:10, textAlign:'center' }}>
                    <p style={{ fontFamily:'Space Mono,monospace', fontSize:10, color:'#666', margin:'0 0 4px', textTransform:'uppercase' }}>Total Aktual</p>
                    <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:18, margin:0 }}>{formatRp(totalActual)}</p>
                  </div>
                  <div style={{ border:'1.5px solid black', padding:14, borderRadius:10, textAlign:'center', gridColumn:'span 2' }}>
                    <p style={{ fontFamily:'Space Mono,monospace', fontSize:10, color: variance >= 0 ? '#0A5A3A' : '#8B1A1A', margin:'0 0 4px', textTransform:'uppercase' }}>
                      {variance >= 0 ? 'Sisa Dana (Under Budget)' : 'Kekurangan (Over Budget)'}
                    </p>
                    <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:22, margin:0 }}>{formatRp(Math.abs(variance))}</p>
                  </div>
                </div>

                <div>
                  <h3 style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:15, borderBottom:'2px solid black', paddingBottom:8, marginBottom:16 }}>Rincian &amp; Riwayat per Item</h3>
                  <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
                    {activeProject.items.map((item, index) => {
                      const itemPlan = item.qty * item.budget;
                      const itemActual = getItemActualTotal(item);
                      const itemVar = itemPlan - itemActual;
                      return (
                        <div key={item.id} style={{ border:'1.5px solid black', borderRadius:10, overflow:'hidden', pageBreakInside:'avoid' }}>
                          <div style={{ background:'#F0F0F0', padding:'10px 14px', borderBottom:'1.5px solid black' }}>
                            <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:14, margin:'0 0 2px' }}>{index+1}. {item.name}</p>
                            <p style={{ fontSize:11, color:'#666', margin:0 }}>{item.qty} {item.unit} &times; {formatRp(item.budget)}</p>
                          </div>
                          <div style={{ padding:12 }}>
                            <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:10 }}>
                              <span style={{ color:'#666' }}>Alokasi Rencana:</span>
                              <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700 }}>{formatRp(itemPlan)}</span>
                            </div>
                            <div style={{ marginBottom:10 }}>
                              <p style={{ fontFamily:'Space Mono,monospace', fontSize:10, color:'#888', textTransform:'uppercase', marginBottom:6 }}>Riwayat Transaksi:</p>
                              {item.actuals && item.actuals.length > 0 ? (
                                <ul style={{ listStyle:'none', padding:0, margin:0, display:'flex', flexDirection:'column', gap:4 }}>
                                  {item.actuals.map((act, i) => (
                                    <li key={i} style={{ display:'flex', justifyContent:'space-between', fontSize:13, gap:12 }}>
                                      <span style={{ color:'#555' }}>&bull; {act.description || <span style={{ fontStyle:'italic', color:'#AAA' }}>Tanpa keterangan</span>}</span>
                                      <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700, whiteSpace:'nowrap' }}>{formatRp(act.amount)}</span>
                                    </li>
                                  ))}
                                </ul>
                              ) : (
                                <p style={{ fontSize:13, fontStyle:'italic', color:'#AAA' }}>- Belum ada transaksi -</p>
                              )}
                            </div>
                            <div style={{ borderTop:'1.5px dashed black', paddingTop:8, display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                              <span style={{ fontFamily:'Space Mono,monospace', fontSize:12, fontWeight:700 }}>Total Terpakai:</span>
                              <span style={{ fontFamily:'Space Mono,monospace', fontWeight:700 }}>{formatRp(itemActual)}</span>
                            </div>
                            <div style={{ display:'flex', justifyContent:'space-between' }}>
                              <span style={{ fontSize:12, color:'#666' }}>{itemVar >= 0 ? 'Sisa Item:' : 'Over Item:'}</span>
                              <span style={{ fontFamily:'Space Mono,monospace', fontSize:12, fontWeight:700 }}>{formatRp(Math.abs(itemVar))}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div style={{ marginTop:60, display: isExporting ? 'flex' : 'none', justifyContent:'space-between', padding:'0 40px' }}>
                  <div style={{ textAlign:'center' }}>
                    <p style={{ marginBottom:80, fontSize:13 }}>Dibuat Oleh,</p>
                    <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, borderBottom:'1.5px solid black', paddingBottom:4, minWidth:150, display:'inline-block' }}></p>
                    <p style={{ fontSize:11, color:'#666', marginTop:4, textTransform:'capitalize' }}>{activeProject.owner}</p>
                  </div>
                  <div style={{ textAlign:'center' }}>
                    <p style={{ marginBottom:80, fontSize:13 }}>Mengetahui,</p>
                    <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, borderBottom:'1.5px solid black', paddingBottom:4, minWidth:150, display:'inline-block' }}></p>
                    <p style={{ fontSize:11, color:'#666', marginTop:4 }}>Finance / HRD</p>
                  </div>
                </div>

                {attachments.length > 0 && (
                  <div style={{ marginTop:60, paddingTop:30, pageBreakBefore:'always' }}>
                    <h3 style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:14, borderBottom:'2px solid black', paddingBottom:8, marginBottom:20, textAlign:'center', textTransform:'uppercase', letterSpacing:'.1em' }}>
                      Lampiran Bukti Transaksi
                    </h3>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
                      {attachments.map((att, idx) => (
                        <div key={idx} style={{ border:'1.5px solid black', padding:10, borderRadius:10, display:'flex', flexDirection:'column', pageBreakInside:'avoid' }}>
                          <div style={{ marginBottom:10, borderBottom:'1.5px dashed black', paddingBottom:8 }}>
                            <p style={{ fontFamily:'Space Mono,monospace', fontWeight:700, fontSize:12, margin:'0 0 4px' }}>Item {att.itemNo}: {att.itemName}</p>
                            <div style={{ display:'flex', justifyContent:'space-between', gap:8 }}>
                              <p style={{ fontSize:11, color:'#555', fontStyle:'italic', margin:0 }}>{att.desc}</p>
                              <p style={{ fontFamily:'Space Mono,monospace', fontSize:11, fontWeight:700, background:'#EEE', padding:'2px 6px', borderRadius:4, whiteSpace:'nowrap', margin:0 }}>{formatRp(att.amount)}</p>
                            </div>
                          </div>
                          <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', minHeight:160 }}>
                            <img src={att.url} style={{ maxWidth:'100%', maxHeight:180, objectFit:'contain' }} alt={`Bukti ${idx+1}`} />
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      if (!currentUser) return <AuthScreen />;

      return (
        <div style={{ background:'var(--cream)', minHeight:'100vh' }}>
          <main>
            {currentView === 'dashboard' ? <Dashboard /> : <ProjectDetail />}
          </main>
          {showNewProjectModal && <NewProjectModal />}
          {showItemModal && <ItemPlanModal />}
          {showActualModal && <ActualInputModal />}
          {showDetailSidebar && <ItemDetailSidebar />}
          {showFullReportSidebar && <FullReportSidebar />}
          <ConfirmModal />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
