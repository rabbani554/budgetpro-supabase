<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDGETpro</title>

  <!-- CSS, Font & Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Core Libraries (React, Babel, PDF, Excel) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    // ====================================================================
    // ⚠️ MASUKKAN CONFIG SUPABASE ANDA DI BAWAH INI
    // ====================================================================
    const SUPABASE_URL = 'https://wzhcyorshcxscgeajcgz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aGN5b3JzaGN4c2NnZWFqY2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDQxNTMsImV4cCI6MjA5MzEyMDE1M30.PJJJcqNpBlPW6DIQ3IyzxuIOF1ueSevqlohJ4FoTqz4';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ====================================================================

    const { useState, useEffect } = React;
    const formatRp = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);
    const displayDate = (s, e) => (!s ? '-' : (s === e ? s : `${s} s/d ${e}`));

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [projects, setProjects] = useState([]);
      const [view, setView] = useState('dashboard');
      const [activeProject, setActiveProject] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showNewProjectModal, setShowNewProjectModal] = useState(false);
      const [showActualModal, setShowActualModal] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [showFullReport, setShowFullReport] = useState(false);

      const fetchProjects = async () => {
        const { data, error } = await supabase.from('projects').select('*').order('id', { ascending: false });
        if (data) setProjects(data);
        setLoading(false);
      };

      useEffect(() => {
        const session = localStorage.getItem('budget_current_user');
        if (session) setCurrentUser(JSON.parse(session));
        else setLoading(false);

        fetchProjects();

        // Real-time subscription Supabase
        const channel = supabase.channel('realtime-projects')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, () => {
            fetchProjects();
          }).subscribe();

        return () => supabase.removeChannel(channel);
      }, []);

      const handleSaveLPJ = async (itemId, newActuals) => {
        const updatedItems = activeProject.items.map(i => i.id === itemId ? { ...i, actuals: newActuals } : i);
        const updatedProj = { ...activeProject, items: updatedItems };
        
        await supabase.from('projects').update({ items: updatedItems }).eq('id', updatedProj.id);
        
        setActiveProject(updatedProj);
        setShowActualModal(false);
        setSelectedItem(null);
      };

      const handleCreateProject = async (p) => {
        await supabase.from('projects').insert([p]);
        setShowNewProjectModal(false);
      };

      if (loading) return (
        <div className="h-screen flex flex-col items-center justify-center bg-blue-600 text-white">
          <i className="fa-solid fa-wallet fa-bounce text-4xl mb-4"></i>
          <p className="font-black uppercase tracking-widest animate-pulse">BUDGETpro</p>
        </div>
      );

      if (!currentUser) return <AuthScreen onLogin={setCurrentUser} />;

      return (
        <div className="min-h-screen flex justify-center bg-gray-200">
          <div className="w-full max-w-md bg-gray-50 min-h-screen relative shadow-2xl flex flex-col overflow-x-hidden">
            {/* HEADER UI */}
            <header className="bg-blue-600 p-6 text-white rounded-b-3xl shadow-lg relative overflow-hidden">
               <div className="absolute top-0 right-0 opacity-10 transform translate-x-4 -translate-y-4">
                 <i className="fa-solid fa-wallet text-9xl"></i>
               </div>
               <div className="relative z-10 flex justify-between items-start">
                  <div>
                    <h1 className="text-2xl font-black tracking-tighter uppercase">BUDGETpro</h1>
                    <p className="text-[10px] italic opacity-80 mt-1 max-w-[200px]">"semoga membantu kamu mempertanggungjawabkan budget yang sudah dibuat"</p>
                  </div>
                  <button onClick={() => {localStorage.removeItem('budget_current_user'); window.location.reload();}} className="bg-blue-700/50 p-2 rounded-full active:bg-red-500 transition-colors">
                    <i className="fa-solid fa-power-off text-sm"></i>
                  </button>
               </div>
               <div className="mt-4 flex items-center gap-2 relative z-10">
                  <span className="text-[10px] font-black uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full">Halo, {currentUser.username}</span>
                  <span className="text-[9px] font-black uppercase opacity-60">Role: {currentUser.role}</span>
               </div>
            </header>

            <main className="p-4 flex-1 pb-24">
              {view === 'dashboard' ? (
                <div className="space-y-4 animate-fade-in">
                  <h2 className="text-[11px] font-black uppercase text-gray-400 tracking-widest mb-2 flex justify-between">
                    Daftar Trip 
                    {currentUser.role === 'admin' && <span className="text-blue-500">Admin Mode</span>}
                  </h2>
                  
                  {projects.length === 0 && (
                    <div className="text-center py-10 opacity-30">
                      <i className="fa-solid fa-folder-open text-4xl mb-3"></i>
                      <p className="text-xs font-bold uppercase">Belum ada trip</p>
                    </div>
                  )}

                  {projects.filter(p => currentUser.role === 'admin' || p.owner === currentUser.username).map(p => (
                    <div key={p.id} onClick={() => { setActiveProject(p); setView('detail'); }} className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm active:scale-95 transition-all cursor-pointer">
                       {currentUser.role === 'admin' && <p className="text-[9px] font-black text-blue-400 mb-1">USER: {p.owner}</p>}
                       <h3 className="font-bold text-gray-800 uppercase text-sm leading-tight">{p.name}</h3>
                       <p className="text-[10px] text-gray-400 font-bold mt-1 tracking-tighter">{displayDate(p.startDate, p.endDate)}</p>
                       <div className="mt-4 pt-3 border-t flex justify-between items-center text-[10px] font-black uppercase">
                          <span className="text-gray-400">Total Terpakai:</span>
                          <span className="text-blue-600">{formatRp(p.items?.reduce((s,i) => s + i.actuals?.reduce((sa, a) => sa + Number(a.amount), 0), 0))}</span>
                       </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="space-y-4 animate-fade-in">
                  <button onClick={() => setView('dashboard')} className="text-[11px] font-black text-blue-600 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i className="fa-solid fa-chevron-left"></i> Kembali
                  </button>
                  <div className="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm">
                    <h2 className="text-lg font-black uppercase text-gray-800 tracking-tight leading-none">{activeProject.name}</h2>
                    <p className="text-[10px] text-gray-400 font-bold uppercase mt-2">{displayDate(activeProject.startDate, activeProject.endDate)}</p>
                  </div>

                  {/* Fitur Laporan & Export Dikembalikan */}
                  <div className="grid grid-cols-2 gap-3 no-print">
                    <button onClick={() => setShowFullReport(true)} className="bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md active:bg-blue-700">Lihat Laporan PDF</button>
                    <button onClick={() => alert('Fitur Export Excel akan menyusul!')} className="bg-green-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md active:bg-green-700">Export Excel</button>
                  </div>

                  <div className="space-y-3 mt-6">
                    {activeProject.items?.map(item => (
                      <div key={item.id} className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center group">
                         <div className="min-w-0 pr-4">
                            <h4 className="font-bold text-gray-800 text-sm uppercase truncate">{item.name}</h4>
                            <p className="text-[10px] text-gray-400 font-bold">BUDGET: {formatRp(item.qty * item.budget)}</p>
                         </div>
                         <button onClick={() => { setSelectedItem(item); setShowActualModal(true); }} className="bg-purple-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-sm active:bg-purple-700 shrink-0">LPJ</button>
                      </div>
                    ))}
                    {(!activeProject.items || activeProject.items.length === 0) && (
                       <p className="text-center text-xs text-gray-400 italic mt-10">Item budget kosong. Harap tambahkan dari panel admin.</p>
                    )}
                  </div>
                </div>
              )}
            </main>

            {/* Tombol Buat Trip Baru Dikembalikan */}
            {view === 'dashboard' && (
              <button onClick={() => setShowNewProjectModal(true)} className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-4 rounded-full font-black text-xs uppercase shadow-2xl active:scale-95 transition-all z-30 flex items-center gap-2">
                <i className="fa-solid fa-plus"></i> Buat Trip Baru
              </button>
            )}

            <footer className="py-6 text-center opacity-30"><p className="text-[10px] font-black uppercase tracking-[0.5em]">by RBN ;D</p></footer>

            {/* Modals */}
            {showNewProjectModal && <NewProjectModal onSave={handleCreateProject} onClose={() => setShowNewProjectModal(false)} user={currentUser} />}
            {showActualModal && <ActualModal item={selectedItem} onClose={() => setShowActualModal(false)} onSave={handleSaveLPJ} projId={activeProject.id} />}
            {showFullReport && <FullReport project={activeProject} onClose={() => setShowFullReport(false)} />}
          </div>
        </div>
      );
    }

    // KOMPONEN LOGIN
    function AuthScreen({ onLogin }) {
      const [u, setU] = useState('');
      const [p, setP] = useState('');
      const [err, setErr] = useState('');
      
      const login = async () => {
        if (!u || !p) return setErr('Harap isi semua kolom');
        setErr('Memeriksa...');
        
        const { data, error } = await supabase.from('users').select('*').eq('username', u).eq('password', p);
        
        if (data && data.length > 0) {
           const user = data[0];
           localStorage.setItem('budget_current_user', JSON.stringify(user));
           onLogin(user);
        } else if (u === 'admin') {
           const admin = { username: 'admin', password: p, role: 'admin' };
           await supabase.from('users').insert([admin]);
           localStorage.setItem('budget_current_user', JSON.stringify(admin));
           onLogin(admin);
        } else {
           setErr('Username/Password Salah');
        }
      };

      return (
        <div className="min-h-screen bg-blue-600 flex items-center justify-center p-4">
          <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl text-center">
            <h1 className="text-3xl font-black text-blue-600 mb-2 uppercase tracking-tighter">BUDGETpro</h1>
            <p className="text-gray-400 text-[10px] italic mb-8 uppercase font-bold tracking-widest">Portal Personel</p>
            {err && <p className="text-red-500 text-[10px] font-bold mb-4 uppercase">{err}</p>}
            <input type="text" placeholder="Username" className="w-full border-2 p-4 rounded-2xl mb-4 outline-none font-bold text-center focus:border-blue-500" onChange={e=>setU(e.target.value)} />
            <input type="password" placeholder="Password" className="w-full border-2 p-4 rounded-2xl mb-8 outline-none font-bold text-center focus:border-blue-500" onChange={e=>setP(e.target.value)} />
            <button onClick={login} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl tracking-widest active:scale-95 transition-transform">Masuk</button>
            <p className="mt-8 text-[8px] font-black text-gray-300 uppercase tracking-[0.3em]">by RBN ;D</p>
          </div>
        </div>
      );
    }

    // KOMPONEN BUAT TRIP BARU
    function NewProjectModal({ onSave, onClose, user }) {
       const [n, setN] = useState('');
       const [s, setS] = useState(new Date().toISOString().split('T')[0]);
       const [e, setE] = useState(new Date().toISOString().split('T')[0]);
       
       return (
         <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 animate-fade-in">
           <div className="bg-white p-8 rounded-[2.5rem] w-full max-w-sm space-y-4 shadow-2xl relative">
              <button onClick={onClose} className="absolute top-6 right-6 text-gray-300 hover:text-gray-500"><i className="fa-solid fa-xmark text-xl"></i></button>
              <h3 className="font-black text-center uppercase tracking-widest text-gray-400 text-xs">Trip Baru</h3>
              <input type="text" placeholder="Nama Event (Cth: Dinas Jkt)" className="w-full border-2 p-3 rounded-xl font-bold outline-none focus:border-blue-500" onChange={e=>setN(e.target.value)} />
              <div className="grid grid-cols-2 gap-2">
                <div><label className="text-[10px] font-bold text-gray-400 px-1">Mulai</label><input type="date" value={s} className="w-full border-2 p-2 rounded-lg text-xs outline-none" onChange={e=>setS(e.target.value)} /></div>
                <div><label className="text-[10px] font-bold text-gray-400 px-1">Selesai</label><input type="date" value={e} className="w-full border-2 p-2 rounded-lg text-xs outline-none" onChange={e=>setE(e.target.value)} /></div>
              </div>
              <button onClick={() => {
                if(!n) return alert("Nama event wajib diisi");
                onSave({ id: Date.now().toString(), name: n, startDate: s, endDate: e, owner: user.username, items: [] });
              }} className="w-full py-4 mt-2 bg-blue-600 text-white rounded-xl font-black uppercase active:bg-blue-700">Simpan Trip</button>
           </div>
         </div>
       );
    }

    // KOMPONEN LPJ & UPLOAD FOTO
    function ActualModal({ item, onClose, onSave, projId }) {
      const [actuals, setActuals] = useState(item.actuals || []);
      const [amt, setAmt] = useState('');
      const [dsc, setDsc] = useState('');
      const [file, setFile] = useState(null);
      const [isUploading, setIsUploading] = useState(false);

      const addTransaction = async () => {
        if(!amt) return;
        setIsUploading(true);
        let publicUrl = null;

        if (file) {
           const fileExt = file.name.split('.').pop();
           const fileName = `${item.id}_${Date.now()}.${fileExt}`;
           const filePath = `${projId}/${fileName}`;
           const { data, error } = await supabase.storage.from('receipts').upload(filePath, file);
           if (data) {
              const { data: urlData } = supabase.storage.from('receipts').getPublicUrl(filePath);
              publicUrl = urlData.publicUrl;
           }
        }

        const newList = [...actuals, { id: Date.now(), amount: amt, description: dsc, receiptUrl: publicUrl }];
        setActuals(newList);
        setAmt(''); setDsc(''); setFile(null);
        setIsUploading(false);
      };

      return (
        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col justify-end animate-fade-in">
           <div className="bg-white rounded-t-[2.5rem] p-6 space-y-5 animate-slide-up shadow-2xl max-h-[90vh] overflow-y-auto">
              <div className="flex justify-between items-center">
                 <h3 className="font-black text-lg uppercase tracking-tighter">LPJ: {item.name}</h3>
                 <button onClick={onClose} className="text-gray-300"><i className="fa-solid fa-circle-xmark text-2xl"></i></button>
              </div>
              
              <div className="space-y-3">
                {actuals.map(a => (
                  <div key={a.id} className="bg-gray-50 border p-3 rounded-xl flex justify-between items-center">
                    <div>
                      <p className="font-bold text-sm text-purple-700">{formatRp(a.amount)}</p>
                      <p className="text-[9px] text-gray-500 uppercase font-bold">{a.description}</p>
                    </div>
                    {a.receiptUrl && <a href={a.receiptUrl} target="_blank" className="bg-green-100 text-green-600 p-2 rounded-lg text-[10px] font-black"><i className="fa-solid fa-image"></i> Cek Nota</a>}
                  </div>
                ))}
              </div>

              <div className="bg-gray-100 p-5 rounded-[2rem] space-y-4 border border-gray-200">
                 <input type="number" className="w-full p-4 rounded-2xl border-2 font-black text-center text-xl text-purple-700 outline-none" placeholder="Nominal Rp" value={amt} onChange={e=>setAmt(e.target.value)} />
                 <input type="text" className="w-full p-4 rounded-2xl border-2 font-bold text-sm outline-none" placeholder="Keterangan (Makan Siang, dll)" value={dsc} onChange={e=>setDsc(e.target.value)} />
                 <div className="bg-white p-2 rounded-xl border-2">
                    <label className="text-[10px] font-black uppercase text-gray-400 block px-2 mb-1">Lampiran Struk (Opsional)</label>
                    <input type="file" accept="image/*" className="w-full text-xs" onChange={e => setFile(e.target.files[0])} />
                 </div>
                 <button onClick={addTransaction} disabled={isUploading} className="w-full py-3 bg-white border-2 border-purple-600 text-purple-600 rounded-2xl font-black uppercase disabled:opacity-50">
                    {isUploading ? <><i className="fa-solid fa-spinner fa-spin"></i> Mengunggah...</> : '+ Tambah Transaksi'}
                 </button>
              </div>
              <button onClick={() => onSave(item.id, actuals)} className="w-full py-4 bg-purple-600 text-white rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all">SIMPAN LPJ KE SERVER</button>
           </div>
        </div>
      );
    }

    // KOMPONEN CETAK PDF
    function FullReport({ project, onClose }) {
       return (
         <div className="fixed inset-0 bg-white z-[200] flex flex-col font-sans animate-fade-in">
            <header className="p-4 border-b flex justify-between items-center bg-gray-50">
               <button onClick={onClose} className="text-blue-600 font-bold uppercase text-[10px]"><i className="fa-solid fa-arrow-left"></i> Kembali</button>
               <h3 className="font-black uppercase text-xs tracking-widest">Detail Laporan</h3>
               <button onClick={() => {
                 const element = document.getElementById('pdf-report-content');
                 html2pdf().from(element).set({ margin: 10, filename: `LPJ_${project.name}.pdf`, html2canvas: { scale: 2 }, jsPDF: { format: 'a4', orientation: 'portrait' } }).save();
               }} className="bg-blue-100 text-blue-600 px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Cetak PDF</button>
            </header>
            <div id="pdf-report-content" className="p-10 space-y-10 overflow-y-auto flex-1 bg-white">
               <div className="text-center space-y-2">
                  <h1 className="text-3xl font-black uppercase tracking-tighter leading-none">{project.name}</h1>
                  <p className="text-xs font-bold text-gray-400 uppercase tracking-[0.3em]">{displayDate(project.startDate, project.endDate)}</p>
                  <p className="text-[10px] font-black uppercase mt-4">Penanggung Jawab: {project.owner}</p>
               </div>
               <div className="space-y-6">
                  {project.items?.map((it, idx) => {
                     const totalActual = it.actuals?.reduce((sum, a) => sum + Number(a.amount), 0) || 0;
                     return (
                        <div key={it.id} className="border-b-2 border-black pb-4">
                           <h4 className="font-black uppercase text-sm">{idx+1}. {it.name}</h4>
                           <p className="text-[10px] text-gray-500 font-bold uppercase mb-2">Budget Disetujui: {formatRp(it.qty * it.budget)} | Total Terpakai: {formatRp(totalActual)}</p>
                           <ul className="space-y-1 mt-2">
                              {it.actuals?.map(a => (
                                <li key={a.id} className="flex justify-between text-[10px] font-bold uppercase italic text-gray-700 bg-gray-50 p-2 rounded">
                                   <span>- {a.description}</span>
                                   <span>{formatRp(a.amount)}</span>
                                </li>
                              ))}
                           </ul>
                        </div>
                     )
                  })}
                  {(!project.items || project.items.length === 0) && <p className="text-center text-xs italic">Tidak ada item budget yang dilaporkan.</p>}
               </div>
               <div className="mt-20 flex justify-between px-10">
                  <div className="text-center"><p className="mb-20 text-[10px] font-black uppercase">Dibuat Oleh,</p><p className="font-black border-b-2 border-black pb-1 uppercase">{project.owner}</p></div>
                  <div className="text-center"><p className="mb-20 text-[10px] font-black uppercase">Mengetahui,</p><p className="font-black border-b-2 border-black pb-1 uppercase">Pimpinan / Keuangan</p></div>
               </div>
            </div>
         </div>
       );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    /* Sembunyikan scrollbar agar rapi di mobile */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</body>
</html>
