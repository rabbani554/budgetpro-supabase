<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDGETpro</title>

  <!-- Ikon & UI Library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    // ====================================================================
    // ⚠️ MASUKKAN CONFIG SUPABASE ANDA DI SINI
    // ====================================================================
    const SUPABASE_URL = 'PASTE_URL_SUPABASE_ANDA';
    const SUPABASE_ANON_KEY = 'PASTE_ANON_KEY_ANDA';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ====================================================================

    const { useState, useEffect } = React;
    const formatRp = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [projects, setProjects] = useState([]);
      const [view, setView] = useState('dashboard');
      const [activeProject, setActiveProject] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showActualModal, setShowActualModal] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);

      const fetchProjects = async () => {
        const { data, error } = await supabase.from('projects').select('*').order('id', { ascending: false });
        if (data) setProjects(data);
        setLoading(false);
      };

      useEffect(() => {
        const session = localStorage.getItem('budget_current_user');
        if (session) {
          setCurrentUser(JSON.parse(session));
        } else {
          setLoading(false);
        }
        fetchProjects();
      }, []);

      const handleSaveLPJ = async (itemId, newActuals) => {
        const updatedItems = activeProject.items.map(i => i.id === itemId ? { ...i, actuals: newActuals } : i);
        const updatedProj = { ...activeProject, items: updatedItems };
        
        // Update ke Supabase
        await supabase.from('projects').update({ items: updatedItems }).eq('id', updatedProj.id);
        
        setActiveProject(updatedProj);
        setShowActualModal(false);
        setSelectedItem(null);
        fetchProjects(); // Refresh data
      };

      if (loading) return (
        <div className="h-screen flex flex-col items-center justify-center bg-blue-600 text-white">
          <i className="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
          <p className="font-black uppercase tracking-widest">BUDGETpro</p>
        </div>
      );

      if (!currentUser) return <AuthScreen onLogin={setCurrentUser} />;

      return (
        <div className="min-h-screen flex justify-center bg-gray-200">
          <div className="w-full max-w-md bg-gray-50 min-h-screen relative shadow-2xl flex flex-col overflow-x-hidden">
            <header className="bg-blue-600 p-6 text-white rounded-b-[2.5rem] shadow-xl relative overflow-hidden">
               <div className="absolute top-0 right-0 opacity-10 transform translate-x-4 -translate-y-4"><i className="fa-solid fa-wallet text-9xl"></i></div>
               <div className="relative z-10">
                 <h1 className="text-2xl font-black tracking-tighter uppercase">BUDGETpro</h1>
                 <p className="text-[10px] italic opacity-80 mt-1">"Powered by Supabase"</p>
               </div>
               <div className="mt-4 flex justify-between items-center relative z-10">
                  <span className="text-[10px] font-bold uppercase tracking-widest bg-blue-800 px-3 py-1 rounded-full">User: {currentUser.username}</span>
                  <button onClick={() => {localStorage.removeItem('budget_current_user'); window.location.reload();}} className="bg-white/20 p-2 rounded-full active:bg-red-500 transition-all"><i className="fa-solid fa-power-off text-xs"></i></button>
               </div>
            </header>

            <main className="p-4 flex-1 pb-20">
              {view === 'dashboard' ? (
                <div className="space-y-4">
                  <p className="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] mb-2">Daftar Event / Trip</p>
                  {projects.filter(p => currentUser.role === 'admin' || p.owner === currentUser.username).map(p => (
                    <div key={p.id} onClick={() => { setActiveProject(p); setView('detail'); }} className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm active:scale-95 transition-all border-l-4 border-l-blue-500">
                       <h3 className="font-bold text-gray-800 uppercase text-sm">{p.name}</h3>
                       <p className="text-[10px] text-gray-400 font-bold uppercase mt-1">{p.startDate} s/d {p.endDate}</p>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="space-y-4 animate-fade-in">
                  <button onClick={() => setView('dashboard')} className="text-[10px] font-bold text-blue-600 uppercase flex items-center gap-2"><i className="fa-solid fa-arrow-left"></i> Kembali ke Dashboard</button>
                  <h2 className="text-lg font-black uppercase text-gray-800 tracking-tight">{activeProject.name}</h2>
                  <div className="space-y-3 mt-4">
                    {activeProject.items?.map(item => (
                      <div key={item.id} className="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
                         <div>
                            <p className="font-bold text-sm uppercase text-gray-700">{item.name}</p>
                            <p className="text-[10px] text-gray-400 font-bold">BUDGET: {formatRp(item.qty * item.budget)}</p>
                         </div>
                         <button onClick={() => {setSelectedItem(item); setShowActualModal(true);}} className="bg-purple-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg active:bg-purple-700">LPJ</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </main>

            {showActualModal && (
              <ActualModal 
                 item={selectedItem}
                 onClose={() => setShowActualModal(false)}
                 onSave={handleSaveLPJ}
                 projId={activeProject.id}
              />
            )}
            
            <footer className="py-10 text-center opacity-20"><p className="text-[10px] font-black uppercase tracking-[0.5em]">by RBN ;D</p></footer>
          </div>
        </div>
      );
    }

    function AuthScreen({ onLogin }) {
      const [u, setU] = useState('');
      const [p, setP] = useState('');
      
      const login = async () => {
        if (!u || !p) return;
        
        // Cek user di Supabase
        const { data, error } = await supabase.from('users').select('*').eq('username', u).eq('password', p);
        
        if (data && data.length > 0) {
           const user = data[0];
           localStorage.setItem('budget_current_user', JSON.stringify(user));
           onLogin(user);
        } else if (u === 'admin') {
           // Buat admin default jika belum ada
           const admin = { username: 'admin', password: p, role: 'admin' };
           await supabase.from('users').insert([admin]);
           localStorage.setItem('budget_current_user', JSON.stringify(admin));
           onLogin(admin);
        } else {
           alert('Username atau password salah!');
        }
      };

      return (
        <div className="min-h-screen bg-blue-600 flex items-center justify-center p-4 font-sans">
          <div className="bg-white p-10 rounded-[3.5rem] w-full max-w-sm shadow-2xl text-center border-t-8 border-blue-400">
            <h1 className="text-3xl font-black text-blue-600 mb-2 uppercase tracking-tighter">BUDGETpro</h1>
            <p className="text-gray-400 text-[10px] italic mb-8 uppercase font-bold tracking-widest leading-relaxed">"Login (Supabase Version)"</p>
            <input type="text" placeholder="Username" className="w-full border-2 p-4 rounded-2xl mb-4 outline-none font-bold text-center focus:border-blue-500" onChange={e=>setU(e.target.value)} />
            <input type="password" placeholder="Password" className="w-full border-2 p-4 rounded-2xl mb-6 outline-none font-bold text-center focus:border-blue-500" onChange={e=>setP(e.target.value)} />
            <button onClick={login} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-transform tracking-widest">Masuk</button>
          </div>
        </div>
      );
    }

    function ActualModal({ item, onClose, onSave, projId }) {
      const [actuals, setActuals] = useState(item.actuals || []);
      const [amt, setAmt] = useState('');
      const [dsc, setDsc] = useState('');
      const [file, setFile] = useState(null);
      const [isUploading, setIsUploading] = useState(false);

      const addTransaction = async () => {
        if(!amt) return;
        setIsUploading(true);
        let publicUrl = null;

        // Upload ke Supabase Storage
        if (file) {
           const fileExt = file.name.split('.').pop();
           const fileName = `${item.id}_${Date.now()}.${fileExt}`;
           const filePath = `${projId}/${fileName}`;
           
           const { data, error } = await supabase.storage.from('receipts').upload(filePath, file);
           
           if (data) {
              const { data: urlData } = supabase.storage.from('receipts').getPublicUrl(filePath);
              publicUrl = urlData.publicUrl;
           }
        }

        const newList = [...actuals, { id: Date.now(), amount: amt, description: dsc, receiptUrl: publicUrl }];
        setActuals(newList);
        setAmt(''); setDsc(''); setFile(null);
        setIsUploading(false);
      };

      return (
        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col justify-end">
           <div className="bg-white rounded-t-[2.5rem] p-6 space-y-5 animate-slide-up shadow-2xl">
              <div className="flex justify-between items-center">
                 <h3 className="font-black text-lg uppercase tracking-tighter">LPJ: {item.name}</h3>
                 <button onClick={onClose} className="text-gray-300"><i className="fa-solid fa-circle-xmark text-2xl"></i></button>
              </div>
              <div className="bg-gray-100 p-5 rounded-[2rem] space-y-4 border border-gray-200">
                 <input type="number" className="w-full p-4 rounded-2xl border-2 font-black text-center text-xl text-purple-700" placeholder="Nominal Rp" value={amt} onChange={e=>setAmt(e.target.value)} />
                 <input type="text" className="w-full p-4 rounded-2xl border-2 font-bold text-sm" placeholder="Keterangan" value={dsc} onChange={e=>setDsc(e.target.value)} />
                 
                 {/* Input File untuk Supabase */}
                 <input type="file" accept="image/*" className="text-xs" onChange={e => setFile(e.target.files[0])} />
                 
                 <button onClick={addTransaction} disabled={isUploading} className="w-full py-3 bg-white border-2 border-purple-600 text-purple-600 rounded-2xl font-black uppercase disabled:opacity-50">
                    {isUploading ? 'MENGUNGGAH FOTO...' : '+ TAMBAH STRUK'}
                 </button>
                 
                 <button onClick={() => onSave(item.id, actuals)} className="w-full py-4 bg-purple-600 text-white rounded-2xl font-black uppercase shadow-xl">SIMPAN LPJ KE SERVER</button>
              </div>
           </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</body>
</html>
